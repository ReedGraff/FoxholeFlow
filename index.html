// RENDERING
// ═══════════════════════════════════════════════════════════════
function render() {
  const stats = computeNodeStats();
  renderAllNodes(stats);
  requestAnimationFrame(() => {
    renderEdges(stats);
    renderSummary(stats);
  });
}

function renderAllNodes(stats) {
  const canvas = document.getElementById('canvas');
  canvas.querySelectorAll('.node-card').forEach(el => el.remove());
  for (const nodeId of Object.keys(appState.nodes)) {
    const el = buildNodeCard(nodeId, stats);
    canvas.appendChild(el);
  }
}

function buildNodeCard(nodeId, stats) {
  const node = appState.nodes[nodeId];
  const pos = node.pos;

  const card = document.createElement('div');
  card.className = `node-card type-${node.type}`;
  card.id = `card-${nodeId}`;
  card.dataset.nodeId = nodeId;
  card.style.left = pos.x + 'px';
  card.style.top  = pos.y + 'px';

  if (node.type === 'production') buildProductionCard(card, nodeId, node, stats);
  else if (node.type === 'output') buildOutputCard(card, nodeId, node, stats);
  else if (node.type === 'input') buildInputCard(card, nodeId, node, stats);

  // Delete button
  const delBtn = document.createElement('button');
  delBtn.style.cssText = `
    position:absolute; top:-8px; right:-8px; width:18px; height:18px;
    background:#ff7b72; border:none; border-radius:50%;
    color:#fff; font-size:10px; cursor:pointer; line-height:1;
    display:flex; align-items:center; justify-content:center; z-index:20;
  `;
  delBtn.textContent = '×';
  delBtn.title = 'Remove this node';
  delBtn.addEventListener('mousedown', e=>e.stopPropagation());
  delBtn.addEventListener('click', e => {
    e.stopPropagation();
    removeNode(nodeId);
    render();
  });
  card.appendChild(delBtn);

  addDragHandler(card, nodeId);
  card.addEventListener('contextmenu', e => {
    e.preventDefault(); e.stopPropagation();
    showNodeContextMenu(nodeId, e.clientX, e.clientY);
  });

  return card;
}

// ── HOVER TRACE (per-material) ───────────────────────────────
// Traces upstream for a specific material at a specific node
function getUpstreamForMaterial(nodeId, materialKey) {
  const nodeSet = new Set([nodeId]);
  const edgeSet = new Set();
  const matPortSet = new Set([`${nodeId}.${materialKey}`]);

  const queue = [{ nid: nodeId, mat: materialKey }];
  while (queue.length > 0) {
    const { nid, mat } = queue.shift();
    const incoming = getIncomingEdges(nid).filter(e => e.toMaterial === mat);
    for (const e of incoming) {
      edgeSet.add(e.id);
      const srcNode = appState.nodes[e.fromNode];
      if (!srcNode) continue;
      nodeSet.add(e.fromNode);
      matPortSet.add(`${e.fromNode}.${e.fromMaterial}`);

      if (srcNode.type === 'production') {
        const recipe = getRecipeForNode(e.fromNode);
        if (recipe) {
          for (const inMatKey of Object.keys(recipe.inputs)) {
            const pk = `${e.fromNode}.${inMatKey}`;
            if (!matPortSet.has(pk)) {
              matPortSet.add(pk);
              queue.push({ nid: e.fromNode, mat: inMatKey });
            }
          }
        }
      }
    }
  }
  return { nodeSet, edgeSet, matPortSet };
}

// Traces downstream for a specific output material at a specific node
function getDownstreamForMaterial(nodeId, materialKey) {
  const nodeSet = new Set([nodeId]);
  const edgeSet = new Set();
  const matPortSet = new Set([`${nodeId}.${materialKey}`]);

  const queue = [{ nid: nodeId, mat: materialKey }];
  while (queue.length > 0) {
    const { nid, mat } = queue.shift();
    const outgoing = getOutgoingEdges(nid).filter(e => e.fromMaterial === mat);
    for (const e of outgoing) {
      edgeSet.add(e.id);
      const dstNode = appState.nodes[e.toNode];
      if (!dstNode) continue;
      nodeSet.add(e.toNode);
      matPortSet.add(`${e.toNode}.${e.toMaterial}`);

      if (dstNode.type === 'production') {
        const recipe = getRecipeForNode(e.toNode);
        if (recipe) {
          for (const outMatKey of Object.keys(recipe.outputs)) {
            const pk = `${e.toNode}.${outMatKey}`;
            if (!matPortSet.has(pk)) {
              matPortSet.add(pk);
              queue.push({ nid: e.toNode, mat: outMatKey });
            }
          }
        }
      }
    }
  }
  return { nodeSet, edgeSet, matPortSet };
}

let _traceActive = false;

function applyMaterialTrace(nodeId, materialKey) {
  if (dragNode || isPanning || dragPort) return;
  _traceActive = true;
  const { nodeSet, edgeSet, matPortSet } = getUpstreamForMaterial(nodeId, materialKey);

  document.querySelectorAll('.node-card').forEach(card => {
    const nid = card.dataset.nodeId;
    if (nodeSet.has(nid)) {
      card.classList.add('highlighted');
      card.classList.remove('dimmed');
    } else {
      card.classList.add('dimmed');
      card.classList.remove('highlighted');
    }
  });

  document.querySelectorAll('.port-row').forEach(row => {
    const rNid = row.dataset.nodeId;
    const rMat = row.dataset.material;
    if (rNid && rMat) {
      const pk = `${rNid}.${rMat}`;
      if (matPortSet.has(pk)) {
        row.classList.add('trace-highlight');
        row.classList.remove('trace-dim');
      } else if (nodeSet.has(rNid)) {
        row.classList.add('trace-dim');
        row.classList.remove('trace-highlight');
      }
    }
  });

  document.querySelectorAll('.edge-path, .edge-hit').forEach(el => {
    const eid = el.dataset.edgeId;
    if (edgeSet.has(eid)) {
      el.classList.add('highlighted');
      el.classList.remove('dimmed');
    } else {
      el.classList.add('dimmed');
      el.classList.remove('highlighted');
    }
  });
  document.querySelectorAll('.edge-label').forEach(el => {
    const eid = el.dataset.edgeId;
    if (!edgeSet.has(eid)) el.classList.add('dimmed');
  });
}

function applyDownstreamTrace(nodeId, materialKey) {
  if (dragNode || isPanning || dragPort) return;
  _traceActive = true;
  const { nodeSet, edgeSet, matPortSet } = getDownstreamForMaterial(nodeId, materialKey);

  document.querySelectorAll('.node-card').forEach(card => {
    const nid = card.dataset.nodeId;
    if (nodeSet.has(nid)) {
      card.classList.add('highlighted');
      card.classList.remove('dimmed');
    } else {
      card.classList.add('dimmed');
      card.classList.remove('highlighted');
    }
  });

  document.querySelectorAll('.port-row').forEach(row => {
    const rNid = row.dataset.nodeId;
    const rMat = row.dataset.material;
    if (rNid && rMat) {
      const pk = `${rNid}.${rMat}`;
      if (matPortSet.has(pk)) {
        row.classList.add('trace-highlight');
        row.classList.remove('trace-dim');
      } else if (nodeSet.has(rNid)) {
        row.classList.add('trace-dim');
        row.classList.remove('trace-highlight');
      }
    }
  });

  document.querySelectorAll('.edge-path, .edge-hit').forEach(el => {
    const eid = el.dataset.edgeId;
    if (edgeSet.has(eid)) {
      el.classList.add('highlighted');
      el.classList.remove('dimmed');
    } else {
      el.classList.add('dimmed');
      el.classList.remove('highlighted');
    }
  });
  document.querySelectorAll('.edge-label').forEach(el => {
    const eid = el.dataset.edgeId;
    if (!edgeSet.has(eid)) el.classList.add('dimmed');
  });
}

function clearMaterialTrace() {
  if (!_traceActive) return;
  _traceActive = false;
  document.querySelectorAll('.node-card.dimmed,.node-card.highlighted').forEach(el => {
    el.classList.remove('dimmed','highlighted');
  });
  document.querySelectorAll('.port-row.trace-highlight,.port-row.trace-dim').forEach(el => {
    el.classList.remove('trace-highlight','trace-dim');
  });
  document.querySelectorAll('.edge-path.dimmed,.edge-path.highlighted,.edge-hit.dimmed,.edge-hit.highlighted,.edge-label.dimmed').forEach(el => {
    el.classList.remove('dimmed','highlighted');
  });
}

// ── PRODUCTION NODE CARD ──────────────────────────────────────
function buildProductionCard(card, nodeId, node, stats) {
  const recipe = getRecipeForNode(nodeId);
  const s = stats[nodeId] || {};
  const intervalSec = 86400;

  // Header: facility name, not material name
  const hdr = document.createElement('div');
  hdr.className = 'node-header';
  if (recipe) {
    hdr.innerHTML = `<div class="node-title">${recipe.buildingName}</div>`;
    if (recipe.upgradeName) hdr.innerHTML += `<div class="node-upg-name">${recipe.upgradeName}</div>`;
  } else {
    hdr.innerHTML = `<div class="node-title">Unknown Facility</div>`;
  }
  card.appendChild(hdr);

  if (!recipe) {
    const nb = document.createElement('div');
    nb.style.cssText = 'padding:8px 10px;font-size:9px;color:#6e7681';
    nb.textContent = 'No recipe assigned.';
    card.appendChild(nb);
    return;
  }

  // Controls: queues + recipe selector
  const ctrl = document.createElement('div');
  ctrl.className = 'node-controls';

  // Recipe selector
  const fKey = `${recipe.buildingKey}/${recipe.upgradeKey||'_'}`;
  const siblings = facilityRecipes[fKey] || [];
  if (siblings.length > 1) {
    ctrl.innerHTML += `<span class="label">Recipe</span>`;
    const sel = document.createElement('select');
    sel.className = 'node-ctrl-select';
    siblings.forEach(r => {
      const opt = document.createElement('option');
      opt.value = r.id;
      const outStr = Object.entries(r.outputs).map(([k,q])=>`${q}× ${matName(k)}`).join(', ');
      opt.textContent = `${outStr} / ${formatTime(r.cycleTime)}`;
      if (r.id === node.recipeId) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.addEventListener('mousedown', e=>e.stopPropagation());
    sel.addEventListener('change', e => {
      node.recipeId = e.target.value;
      render();
    });
    ctrl.appendChild(sel);
  } else {
    const outStr = Object.entries(recipe.outputs).map(([k,q])=>`${q}× ${matName(k)}`).join(', ');
    ctrl.innerHTML += `<span class="label">Cycle:</span>
      <span style="font-size:9px;color:#c9d1d9">${formatTime(recipe.cycleTime)}</span>
      <span class="label" style="margin-left:4px">→</span>
      <span style="font-size:9px;color:#7ee787">${outStr}</span>`;
  }
  card.appendChild(ctrl);

  // Production controls: Solve-for mode + editable fields
  const isCapacity = (node.driveMode || 'demand') === 'capacity';
  const queues = node.queues || 1;
  const fac = s.facilities || (isCapacity ? (node.fixedFacilities||1) : 0);
  const primaryOutKey = Object.keys(recipe.outputs)[0];
  const primaryOutQty = recipe.outputs[primaryOutKey] || 1;
  const cyclesPerSec = s.cyclesPerSec || 0;
  const ratePerDay = cyclesPerSec * primaryOutQty * 86400;

  const pc = document.createElement('div');
  pc.className = 'prod-controls';
  pc.style.position = 'relative';

  // Solve-for selector
  const solveFor = document.createElement('select');
  solveFor.className = 'pc-select';
  solveFor.title = 'What to calculate';
  solveFor.innerHTML = `
    <option value="demand"${!isCapacity?' selected':''}>Fac = ?</option>
    <option value="capacity"${isCapacity?' selected':''}>Rate = ?</option>`;
  solveFor.addEventListener('mousedown', e=>e.stopPropagation());
  solveFor.addEventListener('change', e => {
    node.driveMode = e.target.value === 'capacity' ? 'capacity' : 'demand';
    if (node.driveMode === 'capacity' && !node.fixedFacilities) node.fixedFacilities = fac || 1;
    render();
  });
  pc.appendChild(solveFor);
  pc.appendChild(Object.assign(document.createElement('span'), {className:'pc-sep',textContent:'│'}));

  if (isCapacity) {
    // Capacity mode: user sets facilities, rate is computed
    const facIn = document.createElement('input');
    facIn.type = 'number'; facIn.min = 1; facIn.className = 'pc-input'; facIn.style.width = '30px';
    facIn.value = node.fixedFacilities || 1;
    facIn.title = 'Number of facilities';
    facIn.addEventListener('mousedown', e=>e.stopPropagation());
    facIn.addEventListener('change', e => {
      node.fixedFacilities = Math.max(1, parseInt(e.target.value)||1);
      render();
    });
    pc.appendChild(facIn);
    pc.appendChild(Object.assign(document.createElement('span'), {className:'pc-label',textContent:'fac'}));
    pc.appendChild(Object.assign(document.createElement('span'), {className:'pc-sep',textContent:'×'}));

    const qIn = document.createElement('input');
    qIn.type = 'number'; qIn.min = 1; qIn.max = 10; qIn.className = 'pc-input'; qIn.style.width = '22px';
    qIn.value = queues;
    qIn.title = 'Queues per facility';
    qIn.addEventListener('mousedown', e=>e.stopPropagation());
    qIn.addEventListener('change', e => {
      node.queues = Math.max(1, parseInt(e.target.value)||1);
      render();
    });
    pc.appendChild(qIn);
    pc.appendChild(Object.assign(document.createElement('span'), {className:'pc-label',textContent:'Q'}));
    pc.appendChild(Object.assign(document.createElement('span'), {className:'pc-sep',textContent:'→'}));

    const rateSpan = document.createElement('span');
    rateSpan.className = 'pc-val';
    rateSpan.textContent = `${fmt(ratePerDay)}/day`;
    rateSpan.title = 'Computed output rate';
    pc.appendChild(rateSpan);
  } else {
    // Demand mode: rate is from downstream, facilities are computed
    const facSpan = document.createElement('span');
    facSpan.className = 'pc-val';
    facSpan.style.color = '#79c0ff';
    facSpan.textContent = `${fac} fac`;
    facSpan.title = 'Computed facilities needed';
    pc.appendChild(facSpan);
    pc.appendChild(Object.assign(document.createElement('span'), {className:'pc-sep',textContent:'×'}));

    const qIn = document.createElement('input');
    qIn.type = 'number'; qIn.min = 1; qIn.max = 10; qIn.className = 'pc-input'; qIn.style.width = '22px';
    qIn.value = queues;
    qIn.title = 'Queues per facility';
    qIn.addEventListener('mousedown', e=>e.stopPropagation());
    qIn.addEventListener('change', e => {
      node.queues = Math.max(1, parseInt(e.target.value)||1);
      render();
    });
    pc.appendChild(qIn);
    pc.appendChild(Object.assign(document.createElement('span'), {className:'pc-label',textContent:'Q'}));
    pc.appendChild(Object.assign(document.createElement('span'), {className:'pc-sep',textContent:'→'}));

    const rateSpan = document.createElement('span');
    rateSpan.className = 'pc-val';
    rateSpan.textContent = ratePerDay > 0 ? `${fmt(ratePerDay)}/day` : 'auto';
    rateSpan.title = 'Output rate from downstream demand';
    pc.appendChild(rateSpan);
  }

  // Info icon
  const infoIcon = document.createElement('span');
  infoIcon.className = 'info-icon';
  infoIcon.textContent = 'i';
  infoIcon.title = 'Detailed stats';
  infoIcon.addEventListener('mousedown', e=>e.stopPropagation());
  infoIcon.addEventListener('click', e => {
    e.stopPropagation();
    const pop = pc.querySelector('.info-popover');
    if (pop) pop.classList.toggle('visible');
  });
  pc.appendChild(infoIcon);

  // Info popover
  const cycleTimeSec = recipe.cycleTime || 1;
  const displayFac = fac || 1;
  const cyclesPerDay = cyclesPerSec * 86400;
  const cyclesPerFacility = displayFac > 0 ? cyclesPerDay / displayFac : 0;
  const activeSecPerFac = displayFac > 0 ? (cyclesPerFacility / queues) * cycleTimeSec : 0;
  const utilizationPct = displayFac > 0 ? Math.min(100, (activeSecPerFac / 86400) * 100) : 0;
  const pw = (recipe.power || 0) * displayFac;

  const popover = document.createElement('div');
  popover.className = 'info-popover';
  let popHtml = `
    <div class="stat-row"><span>Mode</span><span class="v">${isCapacity ? 'Capacity' : 'Demand'}</span></div>
    <div class="stat-row"><span>Facilities</span><span class="v blue">${displayFac}</span></div>
    <div class="stat-row"><span>Queues</span><span class="v">${queues}</span></div>
    <div class="stat-row"><span>Cycle</span><span class="v">${formatTime(cycleTimeSec)} → ${primaryOutQty}×</span></div>`;
  if (cyclesPerDay > 0) {
    popHtml += `
    <div class="stat-row"><span>Runs/day</span><span class="v">${fmt(cyclesPerDay)}</span></div>
    <div class="stat-row"><span>Per facility</span><span class="v">${fmt(cyclesPerFacility)}/day</span></div>
    <div class="stat-row"><span>Active/fac</span><span class="v ${utilizationPct>95?'red':utilizationPct>75?'amber':'green'}">${formatTime(Math.round(activeSecPerFac))} (${Math.round(utilizationPct)}%)</span></div>`;
  }
  if (pw !== 0) {
    popHtml += `<div class="stat-row"><span>Power</span><span class="v ${pw<0?'red':'green'}">${pw} MW</span></div>`;
  }
  popover.innerHTML = popHtml;
  pc.appendChild(popover);

  card.appendChild(pc);

  // INPUTS section
  const inputKeys = Object.keys(recipe.inputs);
  if (inputKeys.length) {
    const secLabel = document.createElement('div');
    secLabel.className = 'section-label';
    secLabel.textContent = 'Inputs';
    card.appendChild(secLabel);

    for (const matKey of inputKeys) {
      const qtyPerCycle = recipe.inputs[matKey];
      const { neededPerSec, connectedPerSec } = getInputStatus(nodeId, matKey, stats);
      const neededPerInterval = neededPerSec * intervalSec;
      const connectedPerInterval = connectedPerSec * intervalSec;
      const hasSource = connectedPerSec > 0;
      const isFull = connectedPerSec >= neededPerSec && neededPerSec > 0;

      const row = document.createElement('div');
      row.className = 'port-row input-side';
      row.dataset.nodeId = nodeId;
      row.dataset.material = matKey;
      row.dataset.portType = 'input';

      const dot = document.createElement('span');
      dot.className = `port-dot left ${hasSource ? 'connected' : 'unresolved'}`;
      dot.dataset.nodeId = nodeId;
      dot.dataset.material = matKey;
      dot.dataset.role = 'input';
      row.appendChild(dot);

      const qty = document.createElement('span');
      qty.className = 'port-qty in';
      qty.textContent = `${qtyPerCycle}×`;
      row.appendChild(qty);

      const mat = document.createElement('span');
      mat.className = 'port-mat';
      mat.textContent = matName(matKey);
      row.appendChild(mat);

      const info = document.createElement('span');
      info.className = 'port-info';
      if (neededPerSec > 0) {
        info.textContent = `${fmt(connectedPerInterval)}/${fmt(neededPerInterval)}`;
        info.style.color = isFull ? '#7ee787' : (hasSource ? '#f0883e' : '#ff7b72');
      } else {
        info.textContent = `0/${fmt(qtyPerCycle)}`;
        info.style.color = '#ff7b72';
      }
      row.appendChild(info);

      row.style.cursor = 'pointer';
      const _matKey = matKey;
      row.addEventListener('mousedown', e => e.stopPropagation());
      row.addEventListener('click', e => {
        if (e.target.closest('.port-dot')) return;
        e.stopPropagation();
        openResolver(nodeId, _matKey, e.currentTarget);
      });

      // Per-material hover trace
      row.addEventListener('mouseenter', () => applyMaterialTrace(nodeId, _matKey));
      row.addEventListener('mouseleave', () => clearMaterialTrace());

      card.appendChild(row);
    }
  }

  // OUTPUTS section
  const outputKeys = Object.keys(recipe.outputs);
  if (outputKeys.length) {
    const secLabel = document.createElement('div');
    secLabel.className = 'section-label';
    secLabel.textContent = 'Outputs';
    card.appendChild(secLabel);

    for (const matKey of outputKeys) {
      const qtyPerCycle = recipe.outputs[matKey];
      const producedPerSec = (s.produced && s.produced[matKey]) || 0;

      const outgoing = getOutgoingEdges(nodeId).filter(e => e.fromMaterial === matKey);
      let allocatedPerSec = 0;
      for (const e of outgoing) {
        const rf = getResolvedFlow(e.id);
        allocatedPerSec += rf.flow / rf.interval;
      }
      const surplusPerSec = producedPerSec - allocatedPerSec;

      const row = document.createElement('div');
      row.className = 'port-row output-side';
      row.dataset.nodeId = nodeId;
      row.dataset.material = matKey;
      row.dataset.portType = 'output';

      const qty = document.createElement('span');
      qty.className = 'port-qty out';
      qty.textContent = `${qtyPerCycle}×`;
      row.appendChild(qty);

      const mat = document.createElement('span');
      mat.className = 'port-mat';
      mat.textContent = matName(matKey);
      row.appendChild(mat);

      const info = document.createElement('span');
      info.className = 'port-info';
      if (producedPerSec > 0) {
        info.textContent = `${fmt(producedPerSec * intervalSec)}/day`;
        if (surplusPerSec > 0.0001) {
          info.textContent += ` (${fmt(surplusPerSec * intervalSec)} surplus)`;
          info.style.color = '#f0883e';
        }
      }
      row.appendChild(info);

      const dot = document.createElement('span');
      dot.className = `port-dot right ${outgoing.length ? 'connected' : 'byproduct'}`;
      dot.dataset.nodeId = nodeId;
      dot.dataset.material = matKey;
      dot.dataset.role = 'output';
      row.appendChild(dot);

      // Downstream hover trace for output rows
      const _outMatKey = matKey;
      row.addEventListener('mouseenter', () => applyDownstreamTrace(nodeId, _outMatKey));
      row.addEventListener('mouseleave', () => clearMaterialTrace());

      card.appendChild(row);
    }
  }

  // Compact footer: power only (if nonzero)
  const pw2 = (recipe.power || 0) * (s.facilities || (isCapacity ? (node.fixedFacilities||1) : 0));
  if (pw2 !== 0) {
    const fStats = document.createElement('div');
    fStats.className = 'node-stats';
    fStats.innerHTML = `<div class="stat-row"><span>Power</span><span class="v ${pw2<0?'red':'green'}">${pw2} MW</span></div>`;
    card.appendChild(fStats);
  }
}

// ── OUTPUT NODE CARD ──────────────────────────────────────────
function buildOutputCard(card, nodeId, node, stats) {
  const hdr = document.createElement('div');
  hdr.className = 'node-header';
  hdr.innerHTML = `<div class="node-title">OUTPUT: ${matName(node.materialKey)}</div>
    <div class="node-subtitle">Demand sink</div>`;
  card.appendChild(hdr);

  // Controls
  const ctrl = document.createElement('div');
  ctrl.className = 'node-controls';
  ctrl.innerHTML = `<span class="label">Amount</span>`;
  const amtInput = document.createElement('input');
  amtInput.type = 'number'; amtInput.min = 0; amtInput.value = node.desiredAmount;
  amtInput.className = 'node-ctrl-input'; amtInput.style.width = '60px';
  amtInput.addEventListener('mousedown', e=>e.stopPropagation());
  amtInput.addEventListener('change', e => { node.desiredAmount = Math.max(0, parseFloat(e.target.value)||0); render(); });
  amtInput.addEventListener('input', e => { node.desiredAmount = Math.max(0, parseFloat(e.target.value)||0); });
  ctrl.appendChild(amtInput);

  const perLabel = document.createElement('span');
  perLabel.className = 'label';
  perLabel.textContent = 'per';
  ctrl.appendChild(perLabel);
  const intSel = createIntervalSelect(node.intervalSec, val => { node.intervalSec = val; render(); });
  ctrl.appendChild(intSel);
  card.appendChild(ctrl);

  // Input port
  const incoming = getIncomingEdges(nodeId);
  let connectedPerSec = 0;
  for (const e of incoming) {
    const rf = getResolvedFlow(e.id);
    connectedPerSec += rf.flow / rf.interval;
  }
  const neededPerSec = node.desiredAmount / node.intervalSec;
  const connPerInterval = connectedPerSec * node.intervalSec;
  const neededPerInterval = node.desiredAmount;
  const isFull = connectedPerSec >= neededPerSec - 0.0001 && neededPerSec > 0;

  const secLabel = document.createElement('div');
  secLabel.className = 'section-label';
  secLabel.textContent = 'Receives';
  card.appendChild(secLabel);

  const row = document.createElement('div');
  row.className = 'port-row input-side';
  row.dataset.nodeId = nodeId;
  row.dataset.material = node.materialKey;
  row.dataset.portType = 'input';

  const dot = document.createElement('span');
  dot.className = `port-dot left ${incoming.length ? 'connected' : 'unresolved'}`;
  dot.dataset.nodeId = nodeId;
  dot.dataset.material = node.materialKey;
  dot.dataset.role = 'input';
  row.appendChild(dot);

  const mat = document.createElement('span');
  mat.className = 'port-mat';
  mat.textContent = matName(node.materialKey);
  row.appendChild(mat);

  const info = document.createElement('span');
  info.className = 'port-info';
  info.textContent = `${fmt(connPerInterval)}/${fmt(neededPerInterval)} per ${formatTime(node.intervalSec)}`;
  info.style.color = isFull ? '#7ee787' : '#ff7b72';
  row.appendChild(info);

  row.style.cursor = 'pointer';
  row.addEventListener('mousedown', e => e.stopPropagation());
  row.addEventListener('click', e => {
    if (e.target.closest('.port-dot')) return;
    e.stopPropagation();
    openResolver(nodeId, node.materialKey, e.currentTarget);
  });
  row.addEventListener('mouseenter', () => applyMaterialTrace(nodeId, node.materialKey));
  row.addEventListener('mouseleave', () => clearMaterialTrace());

  card.appendChild(row);
}

// ── INPUT (SOURCE) NODE CARD ──────────────────────────────────
function buildInputCard(card, nodeId, node, stats) {
  const hdr = document.createElement('div');
  hdr.className = 'node-header';
  hdr.innerHTML = `<div class="node-title">SOURCE: ${matName(node.materialKey)}</div>
    <div class="node-subtitle">Collected / external supply</div>`;
  card.appendChild(hdr);

  // Compute total demand from outgoing edges
  const outgoing = getOutgoingEdges(nodeId);
  let totalPerSec = 0;
  for (const e of outgoing) {
    const rf = getResolvedFlow(e.id);
    totalPerSec += rf.flow / rf.interval;
  }

  // Pick a display interval from the first edge, or 24h default
  const displayInterval = outgoing.length > 0 ? getEdgeInterval(outgoing[0]) : 86400;
  const totalPerInterval = totalPerSec * displayInterval;

  const secLabel = document.createElement('div');
  secLabel.className = 'section-label';
  secLabel.textContent = 'Provides';
  card.appendChild(secLabel);

  const row = document.createElement('div');
  row.className = 'port-row output-side';
  row.dataset.nodeId = nodeId;
  row.dataset.material = node.materialKey;
  row.dataset.portType = 'output';

  const mat = document.createElement('span');
  mat.className = 'port-mat';
  mat.textContent = matName(node.materialKey);
  row.appendChild(mat);

  const info = document.createElement('span');
  info.className = 'port-info';
  if (totalPerSec > 0) {
    info.textContent = `${fmt(totalPerInterval)} per ${formatTime(displayInterval)}`;
    info.style.color = '#7ee787';
  } else {
    info.textContent = outgoing.length ? 'auto' : 'not connected';
    info.style.color = '#6e7681';
  }
  row.appendChild(info);

  const dot = document.createElement('span');
  dot.className = `port-dot right source`;
  dot.dataset.nodeId = nodeId;
  dot.dataset.material = node.materialKey;
  dot.dataset.role = 'output';
  row.appendChild(dot);

  card.appendChild(row);
}

function createIntervalSelect(currentVal, onChange) {
  const sel = document.createElement('select');
  sel.className = 'node-ctrl-select';
  sel.style.width = '80px';
  const opts = [
    [3600,'1h'],[7200,'2h'],[21600,'6h'],[43200,'12h'],
    [86400,'24h'],[172800,'48h'],[259200,'72h'],
  ];
  let found = false;
  for (const [v, label] of opts) {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = label;
    if (v === currentVal) { opt.selected = true; found = true; }
    sel.appendChild(opt);
  }
  if (!found) {
    const opt = document.createElement('option');
    opt.value = currentVal;
    opt.textContent = formatTime(currentVal);
    opt.selected = true;
    sel.appendChild(opt);
  }
  sel.addEventListener('mousedown', e=>e.stopPropagation());
  sel.addEventListener('change', e => onChange(parseInt(e.target.value)));
  return sel;
}

// ═══════════════════════════════════════════════════════════════
// EDGE RENDERING
// ═══════════════════════════════════════════════════════════════
function renderEdges(stats) {
  const svg = document.getElementById('svg-edges');
  svg.innerHTML = '';

  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML = `
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#58a6ff" opacity=".8"/></marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#3fb950" opacity=".8"/></marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#f0883e" opacity=".8"/></marker>`;
  svg.appendChild(defs);

  const wrapRect = document.getElementById('canvas-wrap').getBoundingClientRect();

  function clientToSvg(cx, cy) {
    return {
      x: (cx - wrapRect.left - panX) / scale + 2000,
      y: (cy - wrapRect.top  - panY) / scale + 2000,
    };
  }

  for (const edge of Object.values(appState.edges)) {
    const fromCard = document.getElementById(`card-${edge.fromNode}`);
    const toCard   = document.getElementById(`card-${edge.toNode}`);
    if (!fromCard || !toCard) continue;

    // Find the output port row on source
    const srcPortRow = fromCard.querySelector(`.port-row.output-side[data-material="${edge.fromMaterial}"]`);
    // Find the input port row on consumer
    const dstPortRow = toCard.querySelector(`.port-row.input-side[data-material="${edge.toMaterial}"]`);
    if (!srcPortRow || !dstPortRow) continue;

    const srcRect = fromCard.getBoundingClientRect();
    const dstRect = toCard.getBoundingClientRect();
    const srcRowRect = srcPortRow.getBoundingClientRect();
    const dstRowRect = dstPortRow.getBoundingClientRect();

    const p1 = clientToSvg(srcRect.right, (srcRowRect.top + srcRowRect.bottom)/2);
    const p2 = clientToSvg(dstRect.left,  (dstRowRect.top + dstRowRect.bottom)/2);

    const dx = Math.abs(p2.x - p1.x);
    const ctrl = Math.max(60, dx * 0.45);
    const d = `M ${p1.x} ${p1.y} C ${p1.x+ctrl} ${p1.y}, ${p2.x-ctrl} ${p2.y}, ${p2.x} ${p2.y}`;

    const isByproduct = (edge.mode || 'auto') === 'byproduct';
    const isFromInput = appState.nodes[edge.fromNode]?.type === 'input';
    const color = isByproduct ? '#f0883e' : isFromInput ? '#3fb950' : '#58a6ff';
    const marker = isByproduct ? 'url(#arr-orange)' : isFromInput ? 'url(#arr-green)' : 'url(#arr-blue)';

    const hitPath = document.createElementNS('http://www.w3.org/2000/svg','path');
    hitPath.setAttribute('d', d);
    hitPath.setAttribute('fill','none');
    hitPath.setAttribute('stroke','transparent');
    hitPath.setAttribute('stroke-width','12');
    hitPath.classList.add('edge-hit');
    hitPath.dataset.edgeId = edge.id;
    hitPath.addEventListener('click', (ev) => {
      ev.stopPropagation();
      openEdgePopup(edge.id, ev.clientX, ev.clientY);
    });
    hitPath.addEventListener('contextmenu', (ev) => {
      ev.preventDefault(); ev.stopPropagation();
      showEdgeContextMenu(edge.id, ev.clientX, ev.clientY);
    });
    svg.appendChild(hitPath);

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('opacity', '0.65');
    path.setAttribute('marker-end', marker);
    if (isByproduct) path.setAttribute('stroke-dasharray', '6,3');
    path.style.pointerEvents = 'none';
    path.classList.add('edge-path');
    path.dataset.edgeId = edge.id;
    svg.appendChild(path);

    // Edge label
    const mx = (p1.x + p2.x) / 2;
    const my = (p1.y + p2.y) / 2;
    const rf = getResolvedFlow(edge.id);
    const edgeMode = edge.mode || 'auto';
    const modeLabel = edgeMode === 'auto' ? 'AUTO' : edgeMode === 'byproduct' ? 'SURPLUS' : '';
    if (rf.flow > 0) {
      const labelG = addSvgLabel(svg, mx, my,
        `${modeLabel ? modeLabel+' ' : ''}${fmt(rf.flow)} ${matName(edge.fromMaterial)}`,
        `per ${formatTime(rf.interval)}`
      );
      if (labelG) { labelG.classList.add('edge-label'); labelG.dataset.edgeId = edge.id; }
    } else {
      const labelG = addSvgLabel(svg, mx, my,
        modeLabel ? `${modeLabel} · 0` : '⚠ 0 flow',
        'click to configure'
      );
      if (labelG) { labelG.classList.add('edge-label'); labelG.dataset.edgeId = edge.id; }
    }
  }
}

function addSvgLabel(svg, x, y, line1, line2) {
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  const lines = [line1, line2].filter(Boolean);
  const lh = 12, pad = 4;
  const w = Math.max(...lines.map(l=>l.length*5.5)) + pad*2;
  const h = lines.length * lh + pad;

  const bg = document.createElementNS('http://www.w3.org/2000/svg','rect');
  bg.setAttribute('x', x - w/2); bg.setAttribute('y', y - h/2);
  bg.setAttribute('width', w); bg.setAttribute('height', h);
  bg.setAttribute('fill','#0d1117'); bg.setAttribute('rx','3'); bg.setAttribute('opacity','.85');
  g.appendChild(bg);

  lines.forEach((ln,i) => {
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x', x); t.setAttribute('y', y - h/2 + pad + (i+.85)*lh);
    t.setAttribute('text-anchor','middle');
    t.setAttribute('fill', i===0?'#79c0ff':'#6e7681');
    t.setAttribute('font-size','9');
    t.setAttribute('font-family','JetBrains Mono,Fira Code,Consolas,monospace');
    t.textContent = ln;
    g.appendChild(t);
  });
  svg.appendChild(g);
  return g;
}

// ═══════════════════════════════════════════════════════════════
// SUMMARY PANEL
// ═══════════════════════════════════════════════════════════════
function renderSummary(stats) {
  const body = document.getElementById('sum-body');
  const nodeIds = Object.keys(appState.nodes);
  if (!nodeIds.length) {
    body.innerHTML = '<div class="sum-empty">Add nodes to begin planning.</div>';
    return;
  }

  let html = '';

  // Outputs
  const outputNodes = nodeIds.filter(id => appState.nodes[id].type === 'output');
  if (outputNodes.length) {
    html += `<div class="sum-sec">Output Demands</div>`;
    for (const nid of outputNodes) {
      const n = appState.nodes[nid];
      const incoming = getIncomingEdges(nid);
      let connPerSec = 0;
      for (const e of incoming) {
        const rf = getResolvedFlow(e.id);
        connPerSec += rf.flow / rf.interval;
      }
      const connPerI = connPerSec * n.intervalSec;
      const cls = connPerI >= n.desiredAmount - 0.001 ? 'green' : 'red';
      html += sumRow(matName(n.materialKey), `<span class="${cls}">${fmt(connPerI)}/${fmt(n.desiredAmount)}</span> per ${formatTime(n.intervalSec)}`);
    }
  }

  // Production facilities
  const prodNodes = nodeIds.filter(id => appState.nodes[id].type === 'production');
  if (prodNodes.length) {
    html += `<div class="sum-sec">Facilities</div>`;
    for (const nid of prodNodes) {
      const n = appState.nodes[nid];
      const r = getRecipeForNode(nid);
      if (!r) continue;
      const s = stats[nid] || {};
      const loc = r.upgradeName ? `${r.buildingName} (${r.upgradeName})` : r.buildingName;
      html += sumRow(loc, `<span class="facilities-badge">${s.facilities||0}×</span> Q:${n.queues||1}`);
    }
  }

  // Power
  let totalPower = 0;
  for (const nid of prodNodes) {
    totalPower += (stats[nid]?.power || 0);
  }
  if (totalPower !== 0) {
    html += `<div class="sum-sec">Power</div>`;
    html += sumRow('Total', `${totalPower} MW`, totalPower < 0 ? 'red' : 'green');
  }

  // Input sources
  const inputNodes = nodeIds.filter(id => appState.nodes[id].type === 'input');
  if (inputNodes.length) {
    html += `<div class="sum-sec">Input Sources (collected)</div>`;
    for (const nid of inputNodes) {
      const n = appState.nodes[nid];
      const outgoing = getOutgoingEdges(nid);
      let totalAllocPerSec = 0;
      for (const e of outgoing) {
        const rf = getResolvedFlow(e.id);
        totalAllocPerSec += rf.flow / rf.interval;
      }
      const totalAllocPerInterval = totalAllocPerSec * n.intervalSec;
      html += sumRow(matName(n.materialKey), `${fmt(totalAllocPerInterval)} per ${formatTime(n.intervalSec)}`, 'amber');
    }
  }

  // Unresolved: production nodes with inputs that have 0 connected
  const unresolved = [];
  for (const nid of prodNodes) {
    const r = getRecipeForNode(nid);
    if (!r) continue;
    for (const matKey of Object.keys(r.inputs)) {
      const { neededPerSec, connectedPerSec } = getInputStatus(nid, matKey, stats);
      if (neededPerSec > 0 && connectedPerSec < 0.0001) {
        unresolved.push({ nid, matKey });
      }
    }
  }
  if (unresolved.length) {
    html += `<div class="sum-sec" style="color:#ff7b72">Unresolved Inputs (${unresolved.length})</div>`;
    for (const { nid, matKey } of unresolved) {
      const r = getRecipeForNode(nid);
      const loc = r ? (r.upgradeName ? `${r.buildingName} (${r.upgradeName})` : r.buildingName) : '?';
      html += sumRow(`${loc} → ${matName(matKey)}`, '0', 'red');
    }
  }

  body.innerHTML = html;
}

function sumRow(name, val, cls='') {
  return `<div class="sum-row"><span class="sum-name">${name}</span><span class="sum-val ${cls}">${val}</span></div>`;
}

function fmt(n) {
  if (n==null||isNaN(n)) return '0';
  if (n>=1e6) return (n/1e6).toFixed(2)+'M';
  if (n>=1000) return (n/1000).toFixed(1)+'k';
  return n%1===0 ? String(n) : n.toFixed(2);
}

// ═══════════════════════════════════════════════════════════════
// CONTEXT MENU (shadcn-style)
// ═══════════════════════════════════════════════════════════════
function showNodeContextMenu(nodeId, x, y) {
  closeAllPopups();
  const menu = document.getElementById('ctx-menu');
  const node = appState.nodes[nodeId];
  let html = '';

  html += `<div class="ctx-label">${node.type.toUpperCase()} NODE</div>`;

  if (node.type === 'production') {
    const recipe = getRecipeForNode(nodeId);
    if (recipe) {
      html += `<div class="ctx-item" data-action="duplicate"><span class="icon">⧉</span>Duplicate Node</div>`;
      html += `<div class="ctx-sep"></div>`;
      html += `<div class="ctx-label">Outputs</div>`;
      for (const matKey of Object.keys(recipe.outputs)) {
        html += `<div class="ctx-item" data-action="add-output" data-mat="${matKey}"><span class="icon">↗</span>Add Output Sink for ${matName(matKey)}</div>`;
      }
      html += `<div class="ctx-label">Inputs</div>`;
      for (const matKey of Object.keys(recipe.inputs)) {
        html += `<div class="ctx-item" data-action="add-input" data-mat="${matKey}"><span class="icon">↙</span>Add Source for ${matName(matKey)}</div>`;
        html += `<div class="ctx-item" data-action="add-facility-for" data-mat="${matKey}"><span class="icon">⚙</span>Add Facility for ${matName(matKey)}</div>`;
      }
    }
  } else if (node.type === 'output') {
    const matKey = node.materialKey;
    html += `<div class="ctx-label">Source ${matName(matKey)}</div>`;
    html += `<div class="ctx-item" data-action="add-input" data-mat="${matKey}"><span class="icon">↙</span>Add Source Node</div>`;
    html += `<div class="ctx-item" data-action="add-facility-for" data-mat="${matKey}"><span class="icon">⚙</span>Add Facility that produces this</div>`;
    // Show recipes that produce this material
    const recipes = recipeIndex[matKey] || [];
    if (recipes.length) {
      html += `<div class="ctx-sep"></div>`;
      html += `<div class="ctx-label">Create Facility (${recipes.length} recipe${recipes.length>1?'s':''})</div>`;
      for (const r of recipes.slice(0, 8)) {
        const loc = r.upgradeName ? `${r.buildingName} › ${r.upgradeName}` : r.buildingName;
        html += `<div class="ctx-item" data-action="new-facility-connect" data-recipe="${r.id}" data-mat="${matKey}"><span class="icon">+</span>${loc}</div>`;
      }
      if (recipes.length > 8) {
        html += `<div class="ctx-item" data-action="open-resolver" data-mat="${matKey}"><span class="icon">…</span>Show all ${recipes.length} recipes</div>`;
      }
    }
  } else if (node.type === 'input') {
    html += `<div class="ctx-item" data-action="duplicate-input"><span class="icon">⧉</span>Duplicate Source Node</div>`;
  }

  html += `<div class="ctx-sep"></div>`;
  html += `<div class="ctx-item danger" data-action="delete"><span class="icon">✕</span>Delete Node</div>`;

  menu.innerHTML = html;
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
  menu.classList.add('visible');

  menu.querySelectorAll('.ctx-item').forEach(item => {
    item.addEventListener('click', () => {
      const action = item.dataset.action;
      const mat = item.dataset.mat;
      const pos = appState.nodes[nodeId]?.pos || {x:400,y:300};
      if (action === 'delete') {
        removeNode(nodeId);
      } else if (action === 'duplicate') {
        const nid = addProductionNode(getRecipeForNode(nodeId), pos.x + 40, pos.y + 40);
        appState.nodes[nid].queues = node.queues;
      } else if (action === 'duplicate-input') {
        const nid = addInputNode(node.materialKey, pos.x + 40, pos.y + 40);
        appState.nodes[nid].supplyAmount = node.supplyAmount;
        appState.nodes[nid].intervalSec = node.intervalSec;
      } else if (action === 'add-output' && mat) {
        const outId = addOutputNode(mat, pos.x + 350, pos.y);
        addEdge(nodeId, mat, outId, mat, 0, 'auto');
      } else if (action === 'add-input' && mat) {
        const inId = addInputNode(mat, pos.x - 350, pos.y);
        addEdge(inId, mat, nodeId, mat, 0, 'auto');
      } else if (action === 'add-facility-for' && mat) {
        // Open the resolver to pick a recipe
        closeAllPopups();
        render();
        setTimeout(() => {
          const card = document.getElementById(`card-${nodeId}`);
          const row = card?.querySelector(`.port-row[data-material="${mat}"]`);
          if (row) openResolver(nodeId, mat, row);
        }, 50);
        return;
      } else if (action === 'new-facility-connect' && item.dataset.recipe && mat) {
        const recipe = allRecipesList.find(r => r.id === item.dataset.recipe);
        if (recipe) {
          const nid = addProductionNode(recipe, pos.x - 380, pos.y);
          addEdge(nid, mat, nodeId, mat, 0, 'auto');
        }
      } else if (action === 'open-resolver' && mat) {
        closeAllPopups();
        render();
        setTimeout(() => {
          const card = document.getElementById(`card-${nodeId}`);
          const row = card?.querySelector(`.port-row[data-material="${mat}"]`);
          if (row) openResolver(nodeId, mat, row);
        }, 50);
        return;
      }
      closeAllPopups();
      render();
    });
  });
}

function showCanvasContextMenu(x, y, canvasX, canvasY) {

    <div class="ctx-label">CANVAS</div>

  menu.style.top = y + 'px';
  menu.classList.add('visible');

  menu.querySelectorAll('.ctx-item').forEach(item => {
    item.addEventListener('click', () => {
      if (item.dataset.action === 'add-node') {
        openAddNodePopup(x, y, canvasX, canvasY);
      } else if (item.dataset.action === 'auto-layout') {
        autoLayout();
      } else if (item.dataset.action === 'center') {
        centerView();
      }
      menu.classList.remove('visible');
    });
  });
}

// ═══════════════════════════════════════════════════════════════
// EDGE POPUP
// ═══════════════════════════════════════════════════════════════
let activeEdgePopup = null;

function openEdgePopup(edgeId, x, y) {
  closeAllPopups();
  const edge = appState.edges[edgeId];
  if (!edge) return;

  activeEdgePopup = edgeId;
  const popup = document.getElementById('edge-popup');
  const title = document.getElementById('ep-title');
  const flowInput = document.getElementById('ep-flow');
  const intervalSel = document.getElementById('ep-interval');
  const modeSel = document.getElementById('ep-mode');
  const manualFields = document.getElementById('ep-manual-fields');
  const autoDisplay = document.getElementById('ep-auto-display');
  const autoValue = document.getElementById('ep-auto-value');

  title.textContent = `Flow: ${matName(edge.fromMaterial)}`;
  modeSel.value = edge.mode || 'auto';
  flowInput.value = edge.flowPerInterval || 0;

  const edgeMode = edge.mode || 'auto';
  const isManual = edgeMode === 'manual';
  manualFields.style.display = isManual ? 'block' : 'none';
  autoDisplay.style.display = isManual ? 'none' : 'flex';

  if (!isManual) {
    const rf = getResolvedFlow(edgeId);
    const label = edgeMode === 'byproduct' ? 'Surplus' : 'Auto';
    autoValue.textContent = rf.flow > 0
      ? `${label}: ${fmt(rf.flow)} per ${formatTime(rf.interval)}`
      : edgeMode === 'byproduct' ? 'No surplus available' : 'No downstream demand yet';
  }

  // Populate interval select
  const currentInterval = edge.intervalSec || getEdgeInterval(edge);
  intervalSel.innerHTML = '';
  const intervals = [
    [3600,'1h'],[7200,'2h'],[21600,'6h'],[43200,'12h'],
    [86400,'24h'],[172800,'48h'],[259200,'72h'],
  ];
  let found = false;
  for (const [v, label] of intervals) {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = label;
    if (v === currentInterval) { opt.selected = true; found = true; }
    intervalSel.appendChild(opt);
  }
  if (!found) {
    const opt = document.createElement('option');
    opt.value = currentInterval;
    opt.textContent = formatTime(currentInterval);
    opt.selected = true;
    intervalSel.appendChild(opt);
  }

  popup.style.left = Math.min(x, window.innerWidth - 280) + 'px';
  popup.style.top  = Math.min(y, window.innerHeight - 200) + 'px';
  popup.classList.add('visible');
}

document.getElementById('ep-mode')?.addEventListener('change', () => {
  const isManual = document.getElementById('ep-mode').value === 'manual';
  document.getElementById('ep-manual-fields').style.display = isManual ? 'block' : 'none';
  document.getElementById('ep-auto-display').style.display = isManual ? 'none' : 'flex';
});

document.getElementById('ep-ok')?.addEventListener('click', () => {
  if (!activeEdgePopup) return;
  const edge = appState.edges[activeEdgePopup];
  if (edge) {
    const newMode = document.getElementById('ep-mode').value;
    edge.mode = newMode;
    if (newMode === 'manual') {
      edge.flowPerInterval = Math.max(0, parseFloat(document.getElementById('ep-flow').value) || 0);
      edge.intervalSec = parseInt(document.getElementById('ep-interval').value) || 86400;
    }
  }
  document.getElementById('edge-popup').classList.remove('visible');
  activeEdgePopup = null;
  render();
});

document.getElementById('ep-cancel')?.addEventListener('click', () => {
  document.getElementById('edge-popup').classList.remove('visible');
  activeEdgePopup = null;
});

document.getElementById('ep-delete')?.addEventListener('click', () => {
  if (activeEdgePopup) {
    removeEdge(activeEdgePopup);
    document.getElementById('edge-popup').classList.remove('visible');
    activeEdgePopup = null;
    render();
  }
});

// INPUT RESOLVER POPUP
// ═══════════════════════════════════════════════════════════════
function openResolver(consNodeId, inputMaterialKey, anchorEl) {
  closeAllPopups();
  const popup = document.getElementById('resolver');
  const title = document.getElementById('resolver-title');
  const sub   = document.getElementById('resolver-subtitle');
  const body  = document.getElementById('resolver-body');

  title.textContent = `Source for: ${matName(inputMaterialKey)}`;

  // Show existing connections
  const existing = getIncomingEdges(consNodeId).filter(e => e.toMaterial === inputMaterialKey);
  sub.textContent = existing.length ? `${existing.length} source(s) connected` : 'No source connected';

  const recipes = recipeIndex[inputMaterialKey] || [];
  let html = '';

  // Option: Create a source (input) node
  html += `<div class="resolver-section">
    <div class="resolver-sec-label">Collect from field / external</div>
    <div class="resolver-opt collected" data-action="new-input">
      <div class="resolver-opt-title">+ Create Source Node</div>
      <div class="resolver-opt-sub">Add a green source node for ${matName(inputMaterialKey)}</div>
    </div>
  </div>`;

  // Option: Connect to existing nodes that produce this material
  const existingProducers = Object.keys(appState.nodes).filter(nid => {
    if (nid === consNodeId) return false;
    const n = appState.nodes[nid];
    if (n.type === 'input' && n.materialKey === inputMaterialKey) return true;
    if (n.type === 'production') {
      const r = getRecipeForNode(nid);
      return r && r.outputs[inputMaterialKey];
    }
    return false;
  });

  if (existingProducers.length) {
    html += `<div class="resolver-section"><div class="resolver-sec-label">Connect to existing node</div>`;
    for (const nid of existingProducers) {
      const n = appState.nodes[nid];
      let label, sub2;
      if (n.type === 'input') {
        label = `Source: ${matName(n.materialKey)}`;
        sub2 = 'Input source node';
      } else {
        const r = getRecipeForNode(nid);
        const loc = r ? (r.upgradeName ? `${r.buildingName} (${r.upgradeName})` : r.buildingName) : '?';
        label = `→ ${loc}`;
        sub2 = `Produces ${matName(inputMaterialKey)}`;
      }
      // Check if already connected
      const alreadyConnected = existing.some(e => e.fromNode === nid);
      html += `<div class="resolver-opt ${alreadyConnected?'collected':''}" data-action="connect-existing" data-node="${nid}">
        <div class="resolver-opt-title">${label}</div>
        <div class="resolver-opt-sub">${sub2}${alreadyConnected?' (already connected)':''}</div>
      </div>`;
    }
    html += `</div>`;
  }

  // Options: New facility for each recipe that produces this material
  if (recipes.length) {
    html += `<div class="resolver-section"><div class="resolver-sec-label">Create new facility</div>`;
    for (const r of recipes) {
      const loc = r.upgradeName ? `${r.buildingName} (${r.upgradeName})` : r.buildingName;
      const outStr = Object.entries(r.outputs).map(([k,q]) => `${q}× ${matName(k)}`).join(', ');
      const inStr = Object.entries(r.inputs).map(([k,q]) => `${q}× ${matName(k)}`).join(', ');
      html += `<div class="resolver-opt" data-action="new-facility" data-recipe="${r.id}">
        <div class="resolver-opt-title">${loc}</div>
        <div class="resolver-opt-sub" style="color:#7ee787">→ ${outStr} / ${formatTime(r.cycleTime)}</div>
        ${inStr ? `<div class="resolver-opt-sub">Needs: ${inStr}</div>` : ''}
      </div>`;
    }
    html += `</div>`;
  }

  body.innerHTML = html;

  // Position near anchor
  const rect = anchorEl.getBoundingClientRect();
  popup.style.left = Math.min(rect.left, window.innerWidth - 400) + 'px';
  popup.style.top  = (rect.bottom + 4) + 'px';
  if (parseFloat(popup.style.top) + 440 > window.innerHeight) {
    popup.style.top = Math.max(0, rect.top - 440 - 4) + 'px';
  }
  popup.classList.add('visible');

  // Wire options
  body.querySelectorAll('.resolver-opt').forEach(opt => {
    opt.addEventListener('click', () => {
      const action = opt.dataset.action;
      const consPos = appState.nodes[consNodeId]?.pos || {x:400,y:300};

      if (action === 'new-input') {
        const nid = addInputNode(inputMaterialKey, consPos.x - 380, consPos.y);
        addEdge(nid, inputMaterialKey, consNodeId, inputMaterialKey, 0, 'auto');
        closeResolver();
        render();
      } else if (action === 'connect-existing') {
        const srcId = opt.dataset.node;
        const alreadyExists = Object.values(appState.edges).find(e =>
          e.fromNode === srcId && e.fromMaterial === inputMaterialKey &&
          e.toNode === consNodeId && e.toMaterial === inputMaterialKey
        );
        if (!alreadyExists) {
          addEdge(srcId, inputMaterialKey, consNodeId, inputMaterialKey, 0, 'auto');
          closeResolver();
          render();
        } else {
          closeResolver();
        }
      } else if (action === 'new-facility') {
        const recipe = allRecipesList.find(r => r.id === opt.dataset.recipe);
        if (recipe) {
          const nid = addProductionNode(recipe, consPos.x - 380, consPos.y);
          addEdge(nid, inputMaterialKey, consNodeId, inputMaterialKey, 0, 'auto');
          closeResolver();
          render();
        }
      }
    });
  });
}

function closeResolver() {
  document.getElementById('resolver').classList.remove('visible');
}

document.getElementById('resolver-close')?.addEventListener('click', closeResolver);

let addNodePos = { x: 400, y: 300 };
let addNodeTab = 'production';

function openAddNodePopup(screenX, screenY, canvasX, canvasY) {
  closeAllPopups();
  addNodePos = { x: canvasX || 400, y: canvasY || 300 };

  const popup = document.getElementById('add-node-popup');
  popup.style.left = Math.min(screenX || 200, window.innerWidth - 420) + 'px';
  popup.style.top  = Math.min(screenY || 100, window.innerHeight - 520) + 'px';
  popup.classList.add('visible');

  document.getElementById('anp-search').focus();

function renderAddNodeList() {
  const body = document.getElementById('anp-body');
  const q = document.getElementById('anp-search').value.toLowerCase().trim();

  let html = '';

  if (addNodeTab === 'production') {
    let recipes = allRecipesList;
    if (q) {
      recipes = recipes.filter(r => {
        const searchStr = `${r.buildingName} ${r.upgradeName||''} ${Object.keys(r.outputs).map(k=>matName(k)).join(' ')} ${Object.keys(r.inputs).map(k=>matName(k)).join(' ')}`.toLowerCase();
        return searchStr.includes(q);
      });
    }
    recipes = recipes.slice(0, 80);
    for (const r of recipes) {
      const loc = r.upgradeName ? `${r.buildingName} › ${r.upgradeName}` : r.buildingName;
      const outStr = Object.entries(r.outputs).map(([k,q])=>`${q}× ${matName(k)}`).join(', ');
      const inStr = Object.entries(r.inputs).map(([k,q])=>`${q}× ${matName(k)}`).join(', ');
      html += `<div class="anp-opt" data-recipe-id="${r.id}">
        <div class="anp-opt-title">${loc}</div>
        <div class="anp-opt-sub" style="color:#7ee787">→ ${outStr} / ${formatTime(r.cycleTime)}</div>
        ${inStr ? `<div class="anp-opt-sub">Needs: ${inStr}</div>` : ''}
      </div>`;
    }
    if (!recipes.length) html = `<div style="padding:20px;text-align:center;color:#6e7681">No recipes found.</div>`;
  } else if (addNodeTab === 'output') {
    let mats = Object.keys(materialNames).sort((a,b) => matName(a).localeCompare(matName(b)));
    if (q) mats = mats.filter(k => matName(k).toLowerCase().includes(q) || k.toLowerCase().includes(q));
    mats = mats.slice(0, 80);
    for (const k of mats) {
      html += `<div class="anp-opt" data-output-mat="${k}">
        <div class="anp-opt-title" style="color:#f0883e">OUTPUT: ${matName(k)}</div>
        <div class="anp-opt-sub">Demand sink — define desired rate</div>
      </div>`;
    }
  } else if (addNodeTab === 'input') {
    let mats = Object.keys(materialNames).sort((a,b) => matName(a).localeCompare(matName(b)));
    if (q) mats = mats.filter(k => matName(k).toLowerCase().includes(q) || k.toLowerCase().includes(q));
    mats = mats.slice(0, 80);
    for (const k of mats) {
      html += `<div class="anp-opt" data-input-mat="${k}">
        <div class="anp-opt-title" style="color:#3fb950">SOURCE: ${matName(k)}</div>
        <div class="anp-opt-sub">Collected / external supply</div>
      </div>`;
    }
  }

  body.innerHTML = html;

  // Wire clicks
  body.querySelectorAll('.anp-opt').forEach(opt => {
    opt.addEventListener('click', () => {
      if (opt.dataset.recipeId) {
        const r = allRecipesList.find(r => r.id === opt.dataset.recipeId);
        if (r) addProductionNode(r, addNodePos.x, addNodePos.y);
      } else if (opt.dataset.outputMat) {
        addOutputNode(opt.dataset.outputMat, addNodePos.x, addNodePos.y);
      } else if (opt.dataset.inputMat) {
        addInputNode(opt.dataset.inputMat, addNodePos.x, addNodePos.y);
      }
      document.getElementById('add-node-popup').classList.remove('visible');
      render();
    });
  });
}

document.getElementById('anp-search')?.addEventListener('input', renderAddNodeList);

// ═══════════════════════════════════════════════════════════════
// PORT DRAG → CONNECT
// ═══════════════════════════════════════════════════════════════
let dragPort = null; // { nodeId, material, role:'input'|'output', startX, startY }

function onPortDragStart(e) {
  const dot = e.target.closest('.port-dot');
  if (!dot) return;
  e.preventDefault(); e.stopPropagation();

  const nodeId = dot.dataset.nodeId;
  const material = dot.dataset.material;
  const role = dot.dataset.role;
  if (!nodeId || !material || !role) return;

  const rect = dot.getBoundingClientRect();
  const cx = (rect.left + rect.right)/2;
  const cy = (rect.top + rect.bottom)/2;

  dragPort = { nodeId, material, role, startScreenX: cx, startScreenY: cy };

  const rb = document.getElementById('rubber-band');
  const wrapRect = document.getElementById('canvas-wrap').getBoundingClientRect();
  const sx = (cx - wrapRect.left - panX) / scale + 2000;
  const sy = (cy - wrapRect.top - panY) / scale + 2000;
  rb.setAttribute('x1', sx);
  rb.setAttribute('y1', sy);
  rb.setAttribute('x2', sx);
  rb.setAttribute('y2', sy);
  rb.setAttribute('opacity', '0.7');
}

function onPortDragMove(e) {
  if (!dragPort) return;
  const rb = document.getElementById('rubber-band');
  const wrapRect = document.getElementById('canvas-wrap').getBoundingClientRect();
  const mx = (e.clientX - wrapRect.left - panX) / scale + 2000;
  const my = (e.clientY - wrapRect.top - panY) / scale + 2000;
  rb.setAttribute('x2', mx);
  rb.setAttribute('y2', my);
}

function onPortDragEnd(e) {
  if (!dragPort) return;
  const rb = document.getElementById('rubber-band');
  rb.setAttribute('opacity', '0');

  // Find target port under cursor
  const target = document.elementFromPoint(e.clientX, e.clientY);
  const dot = target?.closest?.('.port-dot');

  if (dot && dot.dataset.nodeId && dot.dataset.material && dot.dataset.role) {
    const tNodeId = dot.dataset.nodeId;
    const tMaterial = dot.dataset.material;
    const tRole = dot.dataset.role;

    // Must connect output → input
    let fromNode, fromMat, toNode, toMat;
    if (dragPort.role === 'output' && tRole === 'input') {
      fromNode = dragPort.nodeId; fromMat = dragPort.material;
      toNode = tNodeId; toMat = tMaterial;
    } else if (dragPort.role === 'input' && tRole === 'output') {
      fromNode = tNodeId; fromMat = tMaterial;
      toNode = dragPort.nodeId; toMat = dragPort.material;
    }

    if (fromNode && toNode && fromNode !== toNode && fromMat === toMat) {
      // Check no duplicate edge
      const existing = Object.values(appState.edges).find(e =>
        e.fromNode === fromNode && e.fromMaterial === fromMat &&
        e.toNode === toNode && e.toMaterial === toMat
      );
      if (!existing) {
        addEdge(fromNode, fromMat, toNode, toMat, 0, 'auto');
        render();
      }
    }
  }

  dragPort = null;
}

// ═══════════════════════════════════════════════════════════════
// AUTO-LAYOUT (layered graph with crossing minimization)
// ═══════════════════════════════════════════════════════════════
function autoLayout() {
  const nodeIds = Object.keys(appState.nodes);
  if (!nodeIds.length) return;

  // Step 1: Assign layers via longest-path from sinks (output nodes)
  // Edges flow left→right (from sources to outputs)
  const layer = {};
  const visited = new Set();

  function assignLayer(nid, d) {
    if (layer[nid] !== undefined && layer[nid] >= d) return;
    layer[nid] = d;
    const incoming = getIncomingEdges(nid);
    for (const e of incoming) {
      if (appState.nodes[e.fromNode]) assignLayer(e.fromNode, d + 1);
    }
  }

  // Start from output nodes, then any node with no outgoing edges
  const sinks = nodeIds.filter(id => {
    if (appState.nodes[id].type === 'output') return true;
    return getOutgoingEdges(id).length === 0;
  });
  if (!sinks.length) sinks.push(nodeIds[0]);
  for (const sid of sinks) assignLayer(sid, 0);

  // Assign layer 0 to any disconnected nodes
  for (const nid of nodeIds) {
    if (layer[nid] === undefined) layer[nid] = 0;
  }

  // Group by layer
  const maxLayer = Math.max(...Object.values(layer));
  const layers = [];
  for (let i = 0; i <= maxLayer; i++) layers.push([]);
  for (const nid of nodeIds) layers[layer[nid]].push(nid);

  // Reverse so layer 0 (sinks/outputs) is on the RIGHT
  layers.reverse();

  // Step 2: Barycenter ordering to minimize crossings
  // Run multiple passes, alternating direction
  function getBarycenter(nid, layerIdx, direction) {
    const neighbors = [];
    if (direction === 'forward') {
      const outgoing = getOutgoingEdges(nid);
      for (const e of outgoing) {
        const tgtLayer = layers[layerIdx + 1];
        if (tgtLayer) {
          const idx = tgtLayer.indexOf(e.toNode);
          if (idx >= 0) neighbors.push(idx);
        }
      }
    } else {
      const incoming = getIncomingEdges(nid);
      for (const e of incoming) {
        const srcLayer = layers[layerIdx - 1];
        if (srcLayer) {
          const idx = srcLayer.indexOf(e.fromNode);
          if (idx >= 0) neighbors.push(idx);
        }
      }
    }
    if (!neighbors.length) return -1;
    return neighbors.reduce((a, b) => a + b, 0) / neighbors.length;
  }

  for (let pass = 0; pass < 8; pass++) {
    const dir = pass % 2 === 0 ? 'backward' : 'forward';
    const start = dir === 'forward' ? 0 : layers.length - 1;
    const end   = dir === 'forward' ? layers.length : -1;
    const step  = dir === 'forward' ? 1 : -1;

    for (let li = start; li !== end; li += step) {
      const col = layers[li];
      if (col.length <= 1) continue;
      const scored = col.map(nid => ({
        nid,
        bc: getBarycenter(nid, li, dir === 'forward' ? 'backward' : 'forward'),
      }));
      // Sort by barycenter, keep original order for unconnected
      scored.sort((a, b) => {
        if (a.bc < 0 && b.bc < 0) return 0;
        if (a.bc < 0) return 1;
        if (b.bc < 0) return -1;
        return a.bc - b.bc;
      });
      layers[li] = scored.map(s => s.nid);
    }
  }

  // Step 3: Assign positions
  const NODE_W = 340, NODE_H = 220, H_GAP = 120, V_GAP = 30;
  const maxColSize = Math.max(...layers.map(l => l.length), 1);

  for (let li = 0; li < layers.length; li++) {
    const col = layers[li];
    const x = 60 + li * (NODE_W + H_GAP);
    const totalH = col.length * NODE_H + (col.length - 1) * V_GAP;
    const startY = 60 + (maxColSize * (NODE_H + V_GAP) - totalH) / 2;
    for (let i = 0; i < col.length; i++) {
      appState.nodes[col[i]].pos = {
        x: Math.round(x),
        y: Math.round(startY + i * (NODE_H + V_GAP)),
      };
    }
  }

  render();
  requestAnimationFrame(() => centerView());
}

// ═══════════════════════════════════════════════════════════════
// CANVAS INTERACTIONS
// ═══════════════════════════════════════════════════════════════
let scale=1, panX=0, panY=0;
let isPanning=false, panStartX=0, panStartY=0;
let dragNode=null, dragOffX=0, dragOffY=0;

function updateTransform() {
  document.getElementById('canvas').style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
  document.getElementById('zoom-indicator').textContent = Math.round(scale*100)+'%';
}
function centerView() {
  const positions = Object.values(appState.nodes).map(n=>n.pos);
  if (!positions.length) return;
  const minX = Math.min(...positions.map(p=>p.x));
  const maxX = Math.max(...positions.map(p=>p.x)) + 300;
  const minY = Math.min(...positions.map(p=>p.y));
  const maxY = Math.max(...positions.map(p=>p.y)) + 260;
  const wrap = document.getElementById('canvas-wrap');
  const vW = wrap.clientWidth, vH = wrap.clientHeight;
  const sX = (vW-80)/(maxX-minX||1), sY = (vH-80)/(maxY-minY||1);
  scale = Math.min(1, Math.min(sX, sY));
  panX = (vW-(maxX-minX)*scale)/2 - minX*scale;
  panY = 40 - minY*scale;
  updateTransform();
}

function onWrapDown(e) {
  if (e.button === 2) return; // context menu
  if (e.target.closest('.port-dot')) {
    onPortDragStart(e);
    return;
  }
  if (e.target.closest('.node-card') || e.target.closest('#ctx-menu') ||
      e.target.closest('#add-node-popup') || e.target.closest('#edge-popup') ||
      e.target.closest('#summary-panel')) return;
  closeAllPopups();
  isPanning = true;
  panStartX = e.clientX - panX;
  panStartY = e.clientY - panY;
  document.getElementById('canvas-wrap').classList.add('grabbing');
}
function onWrapMove(e) {
  if (dragPort) {
    onPortDragMove(e);
    return;
  }
  if (isPanning) {
    panX = e.clientX - panStartX;
    panY = e.clientY - panStartY;
    updateTransform();
  }
  if (dragNode) {
    const x = (e.clientX - panX) / scale - dragOffX;
    const y = (e.clientY - 48 - panY) / scale - dragOffY;
    dragNode.style.left = x+'px';
    dragNode.style.top  = y+'px';
    const nid = dragNode.dataset.nodeId;
    if (appState.nodes[nid]) appState.nodes[nid].pos = { x: Math.round(x), y: Math.round(y) };
    requestAnimationFrame(() => renderEdges(computeNodeStats()));
  }
}
function onWrapUp(e) {
  if (dragPort) { onPortDragEnd(e); return; }
  isPanning = false; dragNode = null;
  document.getElementById('canvas-wrap').classList.remove('grabbing');
}
function onZoom(e) {
  e.preventDefault();
  const f = e.deltaY > 0 ? 0.9 : 1.1;
  const ns = Math.max(.15, Math.min(3, scale*f));
  const wrap = document.getElementById('canvas-wrap');
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  panX = mx - (mx-panX)*(ns/scale);
  panY = my - (my-panY)*(ns/scale);
  scale = ns;
  updateTransform();
}

function addDragHandler(card, nodeId) {
  card.addEventListener('mousedown', e => {
    if (e.target.tagName==='SELECT'||e.target.tagName==='INPUT'||
        e.target.tagName==='BUTTON'||e.target.closest('.port-dot')) return;
    if (e.button!==0) return;
    e.stopPropagation();
    dragNode = card;
    const rect = card.getBoundingClientRect();
    dragOffX = (e.clientX - rect.left) / scale;
    dragOffY = (e.clientY - rect.top)  / scale;
  });
}

function closeAllPopups() {
  document.getElementById('ctx-menu').classList.remove('visible');
  document.getElementById('add-node-popup').classList.remove('visible');
  document.getElementById('edge-popup').classList.remove('visible');
  document.getElementById('resolver').classList.remove('visible');
}

// ═══════════════════════════════════════════════════════════════
// SAVE / LOAD
// ═══════════════════════════════════════════════════════════════
function saveLayout() {
  const state = {
    version: 4,
    nodes: appState.nodes,
    edges: appState.edges,
    _nodeCounter, _edgeCounter,
  };
  const json = JSON.stringify(state, null, 2);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([json],{type:'application/json'}));
  a.download = `foxholeflow_layout.json`;
  a.click();
  showToast('Layout exported as JSON file');
}

function loadLayout(json) {
  try {
    const state = JSON.parse(json);
    appState.nodes = state.nodes || {};
    appState.edges = state.edges || {};
    _nodeCounter = state._nodeCounter || 0;
    _edgeCounter = state._edgeCounter || 0;

    // Ensure counters are at least max existing
    const maxN = Object.keys(appState.nodes).map(id => parseInt(id.slice(1))||0).reduce((a,b)=>Math.max(a,b), 0);
    const maxE = Object.keys(appState.edges).map(id => parseInt(id.slice(1))||0).reduce((a,b)=>Math.max(a,b), 0);
    _nodeCounter = Math.max(_nodeCounter, maxN);
    _edgeCounter = Math.max(_edgeCounter, maxE);

    render();
    requestAnimationFrame(() => centerView());
    showToast('Layout imported!');
  } catch(err) {
    showToast('Error: Invalid JSON file');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
async function init() {
  try {
    const resp = await fetch('./foxhole_planner_data.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    parseData(await resp.json());

    document.getElementById('loading').style.display = 'none';
    ['toolbar','canvas-wrap','summary-panel','zoom-indicator']
      .forEach(id=>document.getElementById(id).style.display =
        id==='zoom-indicator'?'block':
        id==='toolbar'?'flex':id==='canvas-wrap'?'block':'flex');

    // Toolbar
    document.getElementById('btn-add-node').addEventListener('click', (e) => {
      const rect = e.target.getBoundingClientRect();
      const canvasX = (rect.left - panX) / scale;
      const canvasY = (rect.bottom + 10 - panY) / scale;
      openAddNodePopup(rect.left, rect.bottom + 4, canvasX, canvasY);
    });

    document.getElementById('btn-save').addEventListener('click', saveLayout);
    document.getElementById('btn-load').addEventListener('click', () => {
      document.getElementById('file-input').click();
    });
    document.getElementById('file-input').addEventListener('change', e => {
      const f = e.target.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = ev => loadLayout(ev.target.result);
      reader.readAsText(f);
      e.target.value = '';
    });
    document.getElementById('btn-auto-layout').addEventListener('click', autoLayout);
    document.getElementById('btn-reset').addEventListener('click', () => {
      scale=1; panX=0; panY=0; updateTransform();
    });
    document.getElementById('btn-clear').addEventListener('click', () => {
      if (!confirm('Clear all nodes and edges?')) return;
      appState.nodes = {};
      appState.edges = {};
      _nodeCounter = 0;
      _edgeCounter = 0;
      render();
    });

    document.addEventListener('keydown', e => { if(e.key==='Escape') closeAllPopups(); });

    const wrap = document.getElementById('canvas-wrap');
    wrap.addEventListener('mousedown', onWrapDown);
    wrap.addEventListener('mousemove', onWrapMove);
    wrap.addEventListener('mouseup', onWrapUp);
    wrap.addEventListener('mouseleave', onWrapUp);
    wrap.addEventListener('wheel', onZoom, { passive:false });
    window.addEventListener('mouseup', onWrapUp);

    // Right-click on canvas
    wrap.addEventListener('contextmenu', e => {
      if (e.target.closest('.node-card')) return;
      e.preventDefault();
      const wrapRect = wrap.getBoundingClientRect();
      const canvasX = (e.clientX - wrapRect.left - panX) / scale;
      const canvasY = (e.clientY - wrapRect.top - panY) / scale;
      showCanvasContextMenu(e.clientX, e.clientY, canvasX, canvasY);
    });

    // Click outside to close popups
    document.addEventListener('click', e => {
      if (!e.target.closest('#ctx-menu') && !e.target.closest('.ctx-item')) {
        document.getElementById('ctx-menu').classList.remove('visible');
      }
    });

    updateTransform();
    render();

  } catch(err) {
    document.getElementById('loading').innerHTML =
      `<div style="color:#ff7b72;font-size:13px">Failed to load data: ${err.message}</div>
       <div style="color:#6e7681;font-size:11px;margin-top:8px">Serve via local server, not file://</div>`;
  }
}

init();
</script>
