<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoxholeFlow — Factory Planner</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
    input[type=number] { -moz-appearance:textfield; }
    body {
      font-family:'JetBrains Mono','Fira Code','Consolas',monospace;
      background:#0d1117; color:#c9d1d9; overflow:hidden;
    }

    /* ── TOOLBAR ──────────────────────────────────────────────── */
    #toolbar {
      position:fixed; top:0; left:0; right:0; height:48px;
      background:#161b22; border-bottom:1px solid #30363d;
      display:flex; align-items:center; padding:0 14px; gap:8px; z-index:1000;
    }
    #toolbar h1 { font-size:13px; font-weight:700; color:#f0883e; white-space:nowrap; margin-right:4px; }
    .tb-sep { width:1px; height:24px; background:#30363d; }
    .tb-label { font-size:10px; color:#6e7681; white-space:nowrap; }
    .tb-select, .tb-number, .tb-input {
      background:#21262d; border:1px solid #30363d; color:#c9d1d9;
      border-radius:5px; font-size:11px; font-family:inherit; height:28px;
      padding:0 7px;
    }
    .tb-select:focus, .tb-number:focus { outline:none; border-color:#58a6ff; }
    .tb-select { max-width:240px; cursor:pointer; }
    .tb-number { width:60px; text-align:center; }
    .tb-btn {
      background:#21262d; border:1px solid #30363d; color:#c9d1d9;
      padding:0 11px; border-radius:5px; cursor:pointer; font-size:11px;
      font-family:inherit; height:28px; white-space:nowrap;
      transition:background .1s, border-color .1s;
    }
    .tb-btn:hover { background:#30363d; border-color:#8b949e; }
    .tb-btn.primary { background:#238636; border-color:#238636; color:#fff; }
    .tb-btn.primary:hover { background:#2ea043; }
    .tb-btn.accent { background:#1f6feb; border-color:#1f6feb; color:#fff; }
    .tb-btn.accent:hover { background:#388bfd; }
    .tb-btn.danger { background:#21262d; border-color:#ff7b7260; color:#ff7b72; }
    .tb-btn.danger:hover { background:#3d1a1a; }
    #tb-status { margin-left:auto; font-size:10px; color:#6e7681; }

    /* ── CANVAS ───────────────────────────────────────────────── */
    #canvas-wrap {
      position:fixed; top:48px; left:0; right:280px; bottom:0;
      overflow:hidden; cursor:grab;
    }
    #canvas-wrap.grabbing { cursor:grabbing; }
    #canvas { position:absolute; transform-origin:0 0; }
    #svg-edges { position:absolute; top:0; left:0; overflow:visible; pointer-events:none; }
    #svg-edges .edge-hit { pointer-events:stroke; cursor:pointer; }

    /* ── NODE CARDS ───────────────────────────────────────────── */
    .node-card {
      position:absolute; width:320px;
      background:#161b22; border:1px solid #30363d; border-radius:8px;
      box-shadow:0 4px 20px rgba(0,0,0,.5);
      user-select:none; cursor:move; overflow:visible;
    }
    .node-card:hover { border-color:#444d56; }
    .node-card.type-output   { border-color:#f0883e66; }
    .node-card.type-output:hover { border-color:#f0883e; }
    .node-card.type-input    { border-color:#3fb95066; }
    .node-card.type-input:hover  { border-color:#3fb950; }

    .node-header {
      padding:8px 10px 7px; border-radius:7px 7px 0 0;
      border-bottom:1px solid #21262d;
    }
    .type-output .node-header     { background:linear-gradient(135deg,#2a1f0e,#21262d); }
    .type-production .node-header { background:#21262d; }
    .type-input .node-header      { background:linear-gradient(135deg,#0e2a12,#21262d); }
    .node-title { font-size:11px; font-weight:700; color:#f0f6fc; line-height:1.4; text-transform:uppercase; letter-spacing:.4px; }
    .type-output .node-title { color:#f0883e; }
    .type-input .node-title  { color:#3fb950; }
    .node-subtitle { font-size:10px; color:#8b949e; margin-top:1px; }
    .node-upg-name { font-size:10px; color:#58a6ff; }

    .node-controls {
      padding:5px 10px; background:#0d1117;
      border-bottom:1px solid #21262d;
      display:flex; align-items:center; gap:6px; flex-wrap:wrap;
    }
    .node-controls .label { font-size:9px; color:#6e7681; white-space:nowrap; }
    .node-ctrl-input {
      background:#21262d; border:1px solid #30363d;
      color:#c9d1d9; font-size:9px; font-family:inherit;
      border-radius:3px; padding:2px 4px; min-width:0; width:50px; text-align:center;
    }
    .node-ctrl-input:focus { outline:none; border-color:#58a6ff; }
    .node-ctrl-select {
      flex:1; background:#21262d; border:1px solid #30363d;
      color:#c9d1d9; font-size:9px; font-family:inherit;
      border-radius:3px; padding:2px 4px; cursor:pointer; min-width:0;
    }
    .node-ctrl-select:focus { outline:none; border-color:#58a6ff; }

    .section-label {
      font-size:9px; font-weight:600; color:#6e7681;
      text-transform:uppercase; letter-spacing:.5px;
      padding:5px 10px 3px; background:#0d1117;
    }

    /* Port rows */
    .port-row {
      display:flex; align-items:center; gap:5px;
      padding:4px 10px;
      border-bottom:1px solid #1a1f27; position:relative;
      min-height:26px;
    }
    .port-row:last-child { border-bottom:none; }
    .port-row.input-side  { padding-left:20px; }
    .port-row.output-side { padding-right:20px; }
    .port-row:hover { background:#1c2128; }

    .port-dot {
      position:absolute; top:50%; transform:translateY(-50%);
      width:9px; height:9px; border-radius:50%;
      border:1.5px solid currentColor; background:#0d1117;
      flex-shrink:0; z-index:10; cursor:pointer;
    }
    .port-dot.left  { left:5px; }
    .port-dot.right { right:5px; }
    .port-dot.unresolved { color:#ff7b72; }
    .port-dot.connected  { color:#58a6ff; }
    .port-dot.source     { color:#3fb950; }
    .port-dot.byproduct  { color:#f0883e; }
    .port-dot.output-port { color:#f0883e; }

    .port-qty { font-size:10px; font-weight:600; white-space:nowrap; }
    .port-qty.in  { color:#79c0ff; }
    .port-qty.out { color:#7ee787; }
    .port-qty.bp  { color:#f0883e; }
    .port-mat { font-size:10px; color:#c9d1d9; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .port-info { font-size:9px; color:#6e7681; white-space:nowrap; }

    .btn-disconnect {
      font-size:9px; color:#ff7b7280; cursor:pointer; padding:1px 3px;
      border-radius:2px; border:none; background:transparent; flex-shrink:0;
    }
    .btn-disconnect:hover { color:#ff7b72; background:#3d1a1a22; }

    /* Stats footer */
    .node-stats {
      padding:6px 10px; background:#0d1117; border-top:1px solid #21262d;
      border-radius:0 0 7px 7px;
    }
    .stat-row { display:flex; justify-content:space-between; font-size:9px; margin-bottom:2px; color:#6e7681; }
    .stat-row:last-child { margin-bottom:0; }
    .stat-row .v { color:#c9d1d9; font-weight:600; }
    .stat-row .v.green { color:#7ee787; }
    .stat-row .v.amber { color:#f0883e; }
    .stat-row .v.red   { color:#ff7b72; }
    .stat-row .v.blue  { color:#79c0ff; }
    .facilities-badge {
      background:#1f6feb22; border:1px solid #1f6feb44;
      border-radius:3px; padding:1px 5px;
      font-size:9px; font-weight:700; color:#79c0ff;
    }

    /* ── RESOLVER POPUP ───────────────────────────────────────── */
    #resolver {
      position:fixed; z-index:3000;
      background:#161b22; border:1px solid #30363d; border-radius:8px;
      box-shadow:0 8px 32px rgba(0,0,0,.6); min-width:300px; max-width:380px;
      display:none;
    }
    #resolver.visible { display:block; }
    .resolver-header {
      padding:9px 12px; border-bottom:1px solid #30363d;
      display:flex; align-items:center; justify-content:space-between;
    }
    .resolver-title { font-size:11px; font-weight:600; color:#f0f6fc; }
    .resolver-subtitle { font-size:9px; color:#6e7681; margin-top:1px; }
    .resolver-close {
      background:none; border:none; color:#6e7681; cursor:pointer;
      font-size:16px; line-height:1; padding:0 4px; border-radius:3px;
    }
    .resolver-close:hover { background:#30363d; color:#f0f6fc; }
    .resolver-body { max-height:400px; overflow-y:auto; padding:8px; }
    .resolver-body::-webkit-scrollbar { width:3px; }
    .resolver-body::-webkit-scrollbar-thumb { background:#30363d; }
    .resolver-section { margin-bottom:8px; }
    .resolver-section:last-child { margin-bottom:0; }
    .resolver-sec-label {
      font-size:9px; font-weight:600; color:#58a6ff;
      text-transform:uppercase; letter-spacing:.5px;
      margin-bottom:5px; padding:0 2px;
    }
    .resolver-opt {
      background:#21262d; border:1px solid #30363d; border-radius:5px;
      padding:7px 10px; margin-bottom:4px; cursor:pointer;
      transition:background .1s, border-color .1s;
    }
    .resolver-opt:last-child { margin-bottom:0; }
    .resolver-opt:hover { background:#2d333b; border-color:#58a6ff; }
    .resolver-opt.collected { border-color:#3fb95044; }
    .resolver-opt.collected:hover { background:#0e1f12; border-color:#3fb950; }
    .resolver-opt-title { font-size:10px; font-weight:600; color:#c9d1d9; }
    .resolver-opt.collected .resolver-opt-title { color:#7ee787; }
    .resolver-opt-sub { font-size:9px; color:#6e7681; margin-top:2px; }

    /* ── CONTEXT MENU ──────────────────────────────────────────── */
    #ctx-menu {
      position:fixed; z-index:4000; display:none;
      background:#161b22; border:1px solid #30363d; border-radius:8px;
      box-shadow:0 8px 32px rgba(0,0,0,.7); min-width:200px;
      padding:4px 0; font-size:11px;
    }
    #ctx-menu.visible { display:block; }
    .ctx-item {
      display:flex; align-items:center; gap:8px;
      padding:7px 14px; cursor:pointer; color:#c9d1d9;
      transition:background .08s;
    }
    .ctx-item:hover { background:#21262d; }
    .ctx-item .icon { font-size:13px; width:16px; text-align:center; flex-shrink:0; }
    .ctx-item.danger { color:#ff7b72; }
    .ctx-sep { height:1px; background:#30363d; margin:4px 0; }
    .ctx-label {
      padding:4px 14px 2px; font-size:9px; color:#6e7681;
      text-transform:uppercase; letter-spacing:.5px; font-weight:600;
    }

    /* ── ADD NODE POPUP ────────────────────────────────────────── */
    #add-node-popup {
      position:fixed; z-index:3500; display:none;
      background:#161b22; border:1px solid #30363d; border-radius:10px;
      box-shadow:0 12px 40px rgba(0,0,0,.7);
      width:400px; max-height:500px; overflow:hidden;
    }
    #add-node-popup.visible { display:flex; flex-direction:column; }
    .anp-header {
      padding:10px 14px; border-bottom:1px solid #30363d;
      display:flex; align-items:center; gap:8px;
    }
    .anp-search {
      flex:1; background:#21262d; border:1px solid #30363d;
      color:#c9d1d9; font-size:12px; font-family:inherit;
      border-radius:5px; padding:6px 10px;
    }
    .anp-search:focus { outline:none; border-color:#58a6ff; }
    .anp-close {
      background:none; border:none; color:#6e7681; cursor:pointer;
      font-size:16px; line-height:1; padding:0 4px; border-radius:3px;
    }
    .anp-close:hover { background:#30363d; color:#f0f6fc; }
    .anp-tabs {
      display:flex; border-bottom:1px solid #30363d;
    }
    .anp-tab {
      flex:1; padding:6px 12px; font-size:10px; text-align:center;
      cursor:pointer; color:#6e7681; border-bottom:2px solid transparent;
      transition: color .1s, border-color .1s;
    }
    .anp-tab:hover { color:#c9d1d9; }
    .anp-tab.active { color:#58a6ff; border-bottom-color:#58a6ff; }
    .anp-body { flex:1; overflow-y:auto; padding:6px; max-height:380px; }
    .anp-body::-webkit-scrollbar { width:4px; }
    .anp-body::-webkit-scrollbar-thumb { background:#30363d; }
    .anp-opt {
      background:#21262d; border:1px solid #30363d; border-radius:5px;
      padding:7px 10px; margin-bottom:4px; cursor:pointer;
      transition:background .1s, border-color .1s;
    }
    .anp-opt:hover { background:#2d333b; border-color:#58a6ff; }
    .anp-opt-title { font-size:10px; font-weight:600; color:#c9d1d9; }
    .anp-opt-sub { font-size:9px; color:#6e7681; margin-top:2px; }

    /* ── EDGE FLOW POPUP ───────────────────────────────────────── */
    #edge-popup {
      position:fixed; z-index:3000; display:none;
      background:#161b22; border:1px solid #30363d; border-radius:8px;
      box-shadow:0 8px 32px rgba(0,0,0,.6); width:280px; padding:12px;
    }
    #edge-popup.visible { display:block; }
    .ep-title { font-size:11px; font-weight:600; color:#f0f6fc; margin-bottom:8px; }
    .ep-row { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
    .ep-row .label { font-size:9px; color:#6e7681; white-space:nowrap; min-width:80px; }
    .ep-input {
      flex:1; background:#21262d; border:1px solid #30363d;
      color:#c9d1d9; font-size:10px; font-family:inherit;
      border-radius:3px; padding:3px 6px; text-align:center;
    }
    .ep-input:focus { outline:none; border-color:#58a6ff; }
    .ep-btns { display:flex; gap:6px; margin-top:8px; }
    .ep-btn {
      flex:1; background:#238636; border:none; color:#fff;
      padding:5px 8px; border-radius:4px; cursor:pointer; font-size:10px;
      font-family:inherit;
    }
    .ep-btn:hover { background:#2ea043; }
    .ep-btn.cancel { background:#21262d; color:#c9d1d9; border:1px solid #30363d; }
    .ep-btn.cancel:hover { background:#30363d; }

    /* ── SUMMARY PANEL ────────────────────────────────────────── */
    #summary-panel {
      position:fixed; top:48px; right:0; width:280px; bottom:0;
      background:#161b22; border-left:1px solid #30363d;
      display:flex; flex-direction:column; overflow:hidden; z-index:500;
    }
    .sum-header {
      padding:9px 14px 8px; border-bottom:1px solid #30363d;
      font-size:11px; font-weight:600; color:#f0f6fc; flex-shrink:0;
    }
    .sum-body { flex:1; overflow-y:auto; padding:10px 12px; }
    .sum-body::-webkit-scrollbar { width:4px; }
    .sum-body::-webkit-scrollbar-thumb { background:#30363d; border-radius:2px; }
    .sum-sec { font-size:9px; font-weight:600; color:#58a6ff; text-transform:uppercase; letter-spacing:.5px; margin:10px 0 5px; }
    .sum-sec:first-child { margin-top:0; }
    .sum-row { display:flex; justify-content:space-between; align-items:baseline; font-size:10px; margin-bottom:3px; padding-bottom:3px; border-bottom:1px solid #1c2128; }
    .sum-row:last-child { border-bottom:none; }
    .sum-name { color:#8b949e; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding-right:6px; }
    .sum-val { color:#c9d1d9; font-weight:600; white-space:nowrap; }
    .sum-val.green { color:#7ee787; }
    .sum-val.amber { color:#f0883e; }
    .sum-val.red   { color:#ff7b72; }
    .sum-empty { font-size:11px; color:#6e7681; text-align:center; padding:24px 0; }

    .sum-legend { padding:10px 12px; border-top:1px solid #30363d; flex-shrink:0; }
    .leg-title { font-size:9px; font-weight:600; color:#58a6ff; text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; }
    .leg-row { display:flex; align-items:center; gap:7px; font-size:9px; color:#8b949e; margin-bottom:3px; }
    .leg-dot { width:8px; height:8px; border-radius:50%; border:1.5px solid; background:#0d1117; flex-shrink:0; }
    .leg-line { width:20px; height:2px; flex-shrink:0; }

    /* ── MISC ──────────────────────────────────────────────────── */
    #zoom-indicator {
      position:fixed; bottom:10px; left:10px;
      background:#21262d; border:1px solid #30363d;
      padding:3px 9px; border-radius:4px; font-size:10px; color:#6e7681; z-index:600;
    }
    #loading {
      position:fixed; inset:0; background:#0d1117;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:14px; z-index:9999; font-size:13px; color:#8b949e;
    }
    .spinner { width:30px; height:30px; border:3px solid #30363d; border-top-color:#f0883e; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #toast {
      position:fixed; bottom:16px; left:50%;
      transform:translateX(-50%) translateY(80px); opacity:0;
      background:#238636; color:#fff; padding:10px 20px;
      border-radius:6px; font-size:12px; z-index:5000; transition:all .25s;
    }
    #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

    /* ── HOVER TRACE (dim/highlight) ────────────────────────────── */
    .node-card.dimmed { opacity:0.15; filter:saturate(0.2); transition:opacity .15s, filter .15s; }
    .node-card.highlighted { border-color:#58a6ff !important; box-shadow:0 0 12px rgba(88,166,255,.3); transition:box-shadow .15s; }
    .port-row.trace-highlight { background:#1f6feb18 !important; }
    .port-row.trace-dim { opacity:0.3; }
    #svg-edges .edge-path.dimmed { opacity:0.06 !important; }
    #svg-edges .edge-path.highlighted { opacity:1 !important; stroke-width:2.5; }
    #svg-edges .edge-label.dimmed { opacity:0.06 !important; }

    /* ── PRODUCTION CONTROLS ────────────────────────────────── */
    .prod-controls {
      padding:5px 10px; background:#0d1117;
      border-bottom:1px solid #21262d;
      display:flex; align-items:center; gap:4px;
      font-size:9px; color:#6e7681;
    }
    .prod-controls .pc-label { font-size:8px; color:#6e7681; white-space:nowrap; }
    .prod-controls .pc-input {
      background:#21262d; border:1px solid #30363d;
      color:#c9d1d9; font-size:9px; font-family:inherit;
      border-radius:3px; padding:2px 4px; width:36px; text-align:center;
    }
    .prod-controls .pc-input:focus { outline:none; border-color:#58a6ff; }
    .prod-controls .pc-input.computed {
      border-color:#1f6feb44; color:#79c0ff; background:#1f6feb11;
    }
    .prod-controls .pc-select {
      background:#21262d; border:1px solid #30363d; color:#c9d1d9;
      font-size:8px; font-family:inherit; border-radius:3px; padding:1px 2px;
      cursor:pointer;
    }
    .prod-controls .pc-select:focus { outline:none; border-color:#58a6ff; }
    .prod-controls .pc-val {
      font-size:9px; font-weight:600; color:#7ee787; white-space:nowrap;
    }
    .prod-controls .pc-sep { color:#30363d; }

    /* ── INFO POPOVER ────────────────────────────────────────── */
    .info-icon {
      display:inline-flex; align-items:center; justify-content:center;
      width:14px; height:14px; border-radius:50%;
      border:1px solid #30363d; color:#6e7681; font-size:8px;
      cursor:pointer; flex-shrink:0; margin-left:auto;
      font-style:italic; font-weight:700; font-family:serif;
    }
    .info-icon:hover { background:#21262d; color:#c9d1d9; }
    .info-popover {
      position:absolute; z-index:100; right:10px; top:100%;
      background:#161b22; border:1px solid #30363d; border-radius:6px;
      box-shadow:0 6px 24px rgba(0,0,0,.5); padding:8px 10px;
      min-width:200px; display:none; font-size:9px;
    }
    .info-popover.visible { display:block; }
    .info-popover .stat-row { display:flex; justify-content:space-between; margin-bottom:2px; color:#6e7681; }
    .info-popover .stat-row .v { color:#c9d1d9; font-weight:600; }
    .info-popover .stat-row .v.green { color:#7ee787; }
    .info-popover .stat-row .v.amber { color:#f0883e; }
    .info-popover .stat-row .v.red { color:#ff7b72; }

    /* rubber-band handled in SVG */
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><span>Loading factory data…</span></div>

<!-- Toolbar -->
<div id="toolbar" style="display:none">
  <h1>FoxholeFlow</h1>
  <div class="tb-sep"></div>
  <button class="tb-btn accent" id="btn-add-node">+ Add Node</button>
  <div class="tb-sep"></div>
  <button class="tb-btn primary" id="btn-save">Export</button>
  <button class="tb-btn" id="btn-load">Import</button>
  <button class="tb-btn" id="btn-auto-layout">Auto Layout</button>
  <button class="tb-btn" id="btn-reset">Reset View</button>
  <button class="tb-btn danger" id="btn-clear">Clear All</button>
  <input id="file-input" type="file" accept=".json" style="display:none">
  <span id="tb-status"></span>
</div>

<!-- Canvas -->
<div id="canvas-wrap" style="display:none">
  <div id="canvas">
    <svg id="svg-edges" width="8000" height="8000" style="position:absolute;top:-2000px;left:-2000px;pointer-events:none;"></svg>
    <svg id="svg-rubber" width="8000" height="8000" style="position:absolute;top:-2000px;left:-2000px;pointer-events:none;overflow:visible;">
      <line id="rubber-band" x1="0" y1="0" x2="0" y2="0" stroke="#58a6ff" stroke-width="2" stroke-dasharray="6,3" opacity="0"/>
    </svg>
  </div>
</div>

<!-- Summary -->
<div id="summary-panel" style="display:none">

  <div class="sum-legend">
    <div class="leg-title">Legend</div>
    <div class="leg-row"><span class="leg-dot" style="color:#ff7b72"></span> Unresolved / missing (0 of N)</div>
    <div class="leg-row"><span class="leg-dot" style="color:#3fb950"></span> Input source node</div>
    <div class="leg-row"><span class="leg-dot" style="color:#58a6ff"></span> Connected via edge</div>

    </div>

</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════════════════════════
let recipeIndex  = {};   // materialKey → [recipeObj, ...]
let materialNames = {};
let allRecipesList = [];  // flat list of all unique recipes (for searching)
let facilityRecipes = {}; // buildingKey/upgradeKey → [recipes]

const ALWAYS_RAW = new Set([
  'metal','components','sulfur','raremetal','facilitycoal1',
  'facilityoil1','facilityoil2','water','petrol',
  'facilitycomponents1','heavyexplosive','explosive',
]);

const DEFAULT_QUEUES = {
  'large_assembly_factory': 1,
  'light_vehicle_assembly_station': 1,
};
const DEFAULT_QUEUE_COUNT = 5;

function getQty(v) { return v == null ? 0 : typeof v === 'object' ? (v.quantity||0) : v; }
function normIO(obj) {
  if (!obj) return {};
  const r = {};
  for (const [k,v] of Object.entries(obj)) r[k] = getQty(v);
  return r;
}

function parseData(data) {
  for (const [k,v] of Object.entries(data.resources||{})) materialNames[k] = v.name||k;
  for (const [k,v] of Object.entries(data.buildings||{})) if (v.name && !materialNames[k]) materialNames[k] = v.name;

  const bldgs = data.buildings||{};
  for (const [bKey,building] of Object.entries(bldgs)) {
    const bName = building.name||bKey, bPow = building.power||0;

    const process = (prods, uKey, uName) => {
      for (const prod of (prods||[])) {
        const inputs  = normIO(prod.input);
        const outputs = normIO(prod.output);
        if (!Object.keys(outputs).length) continue;
        const cycleTime = prod.time||1;
        const power = prod.power ?? bPow;

        const allOutputKeys = Object.keys(outputs);
        const recipe = {
          id:`${bKey}/${uKey||'_'}/${prod.id??0}`,
          buildingKey:bKey, buildingName:bName,
          upgradeKey:uKey||null, upgradeName:uName||null,
          inputs, outputs, cycleTime, power,
        };

        for (const outKey of allOutputKeys) {
          if (!recipeIndex[outKey]) recipeIndex[outKey] = [];
          recipeIndex[outKey].push(recipe);
        }
        allRecipesList.push(recipe);

        const fKey = `${bKey}/${uKey||'_'}`;
        if (!facilityRecipes[fKey]) facilityRecipes[fKey] = [];
        if (!facilityRecipes[fKey].includes(recipe)) facilityRecipes[fKey].push(recipe);
      }
    };
    process(building.production, null, null);
    for (const [uKey,up] of Object.entries(building.upgrades||{}))
      process(up.production, uKey, up.name||uKey);
  }

  // dedupe allRecipesList by id
  const seen = new Set();
  allRecipesList = allRecipesList.filter(r => {
    if (seen.has(r.id)) return false;
    seen.add(r.id); return true;
  });
}

function formatTime(s) {
  if (s<60) return `${s}s`;
  if (s<3600){ const m=Math.floor(s/60),r=s%60; return r?`${m}m${r}s`:`${m}m`; }
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return m?`${h}h${m}m`:`${h}h`;
}
function matName(k) { return materialNames[k]||k; }

function recipeLabel(r) {
  const outs = Object.entries(r.outputs).map(([k,q]) => `${q}× ${matName(k)}`).join(', ');
  const loc = r.upgradeName ? `${r.buildingName} › ${r.upgradeName}` : r.buildingName;
  return `${loc} → ${outs} / ${formatTime(r.cycleTime)}`;
}

// ═══════════════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════════════
let _nodeCounter = 0;
function newNodeId() { return `n${++_nodeCounter}`; }
let _edgeCounter = 0;
function newEdgeId() { return `e${++_edgeCounter}`; }

/*
  Node types:
    - 'production': A facility producing materials. Has recipe, queues, inputs, outputs.
    - 'output':     A demand/sink node. Material + desired rate + interval.
    - 'input':      A source node (collected resource). Material + supply rate + interval.
  
  Edge: { id, fromNode, fromMaterial, toNode, toMaterial, flowPerInterval, intervalSec (null=inherit) }
*/

const appState = {
  nodes: {},
  edges: {},
};

function getRecipeForNode(nodeId) {
  const n = appState.nodes[nodeId];
  if (!n || n.type !== 'production') return null;
  if (!n.recipeId) return null;
  return allRecipesList.find(r => r.id === n.recipeId) || null;
}

// ═══════════════════════════════════════════════════════════════
// GRAPH OPERATIONS
// ═══════════════════════════════════════════════════════════════

function addProductionNode(recipe, x, y) {
  const id = newNodeId();
  const defaultQ = (recipe && recipe.buildingKey in DEFAULT_QUEUES)
    ? DEFAULT_QUEUES[recipe.buildingKey]
    : DEFAULT_QUEUE_COUNT;
  appState.nodes[id] = {
    id, type: 'production',
    recipeId: recipe.id,
    queues: defaultQ,
    driveMode: 'demand',
    fixedFacilities: 1,
    pos: { x, y },
  };
  return id;
}

function addOutputNode(materialKey, x, y) {
  const id = newNodeId();
  appState.nodes[id] = {
    id, type: 'output',
    materialKey,
    desiredAmount: 1,
    intervalSec: 86400,
    pos: { x, y },
  };
  return id;
}

function addInputNode(materialKey, x, y) {
  const id = newNodeId();
  appState.nodes[id] = {
    id, type: 'input',
    materialKey,
    supplyAmount: 0,
    intervalSec: 86400,
    pos: { x, y },
  };
  return id;
}

function addEdge(fromNode, fromMaterial, toNode, toMaterial, flow, mode) {
  const id = newEdgeId();
  const toNodeObj = appState.nodes[toNode];
  const defaultInterval = (toNodeObj && (toNodeObj.type === 'output' || toNodeObj.type === 'input'))
    ? toNodeObj.intervalSec : 86400;
  appState.edges[id] = {
    id,
    fromNode, fromMaterial,
    toNode, toMaterial,
    flowPerInterval: flow || 0,
    intervalSec: defaultInterval,
    mode: mode || 'auto',
  };
  return id;
}

function removeEdge(edgeId) {
  delete appState.edges[edgeId];
}

function removeNode(nodeId) {
  delete appState.nodes[nodeId];
  for (const eid of Object.keys(appState.edges)) {
    const e = appState.edges[eid];
    if (e.fromNode === nodeId || e.toNode === nodeId) delete appState.edges[eid];
  }
}

function getIncomingEdges(nodeId) {
  return Object.values(appState.edges).filter(e => e.toNode === nodeId);
}
function getOutgoingEdges(nodeId) {
  return Object.values(appState.edges).filter(e => e.fromNode === nodeId);
}
function getEdgesBetween(fromId, toId) {
  return Object.values(appState.edges).filter(e => e.fromNode === fromId && e.toNode === toId);
}

// ═══════════════════════════════════════════════════════════════
// DEMAND / FLOW COMPUTATION
// ═══════════════════════════════════════════════════════════════

function getNodeInterval(nodeId) {
  const node = appState.nodes[nodeId];
  if (!node) return 86400;
  if (node.type === 'output' || node.type === 'input') return node.intervalSec || 86400;
  return 86400;
}

function getEdgeInterval(edge) {
  if (edge.intervalSec) return edge.intervalSec;
  const toNode = appState.nodes[edge.toNode];
  if (toNode && (toNode.type === 'output' || toNode.type === 'input')) return toNode.intervalSec || 86400;
  const fromNode = appState.nodes[edge.fromNode];
  if (fromNode && (fromNode.type === 'output' || fromNode.type === 'input')) return fromNode.intervalSec || 86400;
  return 86400;
}

// resolvedFlows: edgeId → { flow, interval } (flow per interval in real units)
let resolvedFlows = {};

function getResolvedFlow(edgeId) {
  return resolvedFlows[edgeId] || { flow: 0, interval: 86400 };
}

function resolveAutoFlows() {
  resolvedFlows = {};

  // Phase 0: Set manual edges immediately
  for (const [eid, edge] of Object.entries(appState.edges)) {
    if (edge.mode === 'manual') {
      resolvedFlows[eid] = { flow: edge.flowPerInterval, interval: getEdgeInterval(edge) };
    }
  }

  // Run phases 1-3 in a convergence loop: byproduct edges reduce auto demand,
  // which must propagate backward. Save byproduct flows between passes.
  let prevByproductFlows = {};
  for (let outerPass = 0; outerPass < 4; outerPass++) {
    if (outerPass > 0) {
      // Save byproduct resolved flows before clearing
      prevByproductFlows = {};
      for (const [eid, edge] of Object.entries(appState.edges)) {
        if (edge.mode === 'byproduct' && resolvedFlows[eid]) {
          prevByproductFlows[eid] = resolvedFlows[eid];
        }
      }
      for (const [eid, edge] of Object.entries(appState.edges)) {
        if (edge.mode !== 'manual') delete resolvedFlows[eid];
      }
    }

  // Phase 1: Backward walk from outputs — consumers set demand on incoming auto edges
  const resolved = new Set();
  const queue = [];

  for (const [nid, node] of Object.entries(appState.nodes)) {
    if (node.type === 'output') queue.push(nid);
  }
  for (const [nid, node] of Object.entries(appState.nodes)) {
    if (node.type === 'production') {
      const outgoing = getOutgoingEdges(nid);
      if (outgoing.length === 0 || outgoing.every(e => resolvedFlows[e.id])) {
        queue.push(nid);
      }
    }
  }

  let iterations = 0;
  const maxIter = Object.keys(appState.nodes).length * 3 + 10;

  while (queue.length > 0 && iterations < maxIter) {
    iterations++;
    const nid = queue.shift();
    if (resolved.has(nid)) continue;

    const node = appState.nodes[nid];
    if (!node) continue;

    const outgoing = getOutgoingEdges(nid).filter(e => e.mode !== 'byproduct');
    const allOutResolved = outgoing.every(e => resolvedFlows[e.id]);
    if (!allOutResolved && node.type === 'production') {
      queue.push(nid);
      continue;
    }

    resolved.add(nid);

    const inputNeeds = {};

    if (node.type === 'output') {
      inputNeeds[node.materialKey] = node.desiredAmount / (node.intervalSec || 86400);
    } else if (node.type === 'production') {
      const recipe = getRecipeForNode(nid);
      if (recipe) {
        const isCapacity = (node.driveMode || 'demand') === 'capacity';
        let maxCyclesPerSec = 0;
        if (isCapacity) {
          maxCyclesPerSec = (node.fixedFacilities || 1) * (node.queues || 1) / recipe.cycleTime;
        } else {
          // Aggregate outgoing flow by material, then compute cycles
          const outDemand = {};
          for (const e of outgoing) {
            const rf = resolvedFlows[e.id];
            if (!rf) continue;
            const perSec = rf.flow / rf.interval;
            outDemand[e.fromMaterial] = (outDemand[e.fromMaterial]||0) + perSec;
          }
          for (const [matKey, perSec] of Object.entries(outDemand)) {
            const outQty = recipe.outputs[matKey] || 0;
            if (outQty > 0) {
              maxCyclesPerSec = Math.max(maxCyclesPerSec, perSec / outQty);
            }
          }
        }
        for (const [matKey, qty] of Object.entries(recipe.inputs)) {
          inputNeeds[matKey] = maxCyclesPerSec * qty;
        }
      }
    }

    const incoming = getIncomingEdges(nid);
    for (const matKey of Object.keys(inputNeeds)) {
      const neededPerSec = inputNeeds[matKey];
      const allForMat = incoming.filter(e => e.toMaterial === matKey);

      let manualPerSec = 0;
      let byproductPerSec = 0;
      const autoEdges = [];
      for (const e of allForMat) {
        if (e.mode === 'manual') {
          const rf = resolvedFlows[e.id];
          manualPerSec += rf ? (rf.flow / rf.interval) : 0;
        } else if (e.mode === 'byproduct') {
          const prevRf = prevByproductFlows[e.id];
          if (prevRf) byproductPerSec += prevRf.flow / prevRf.interval;
        } else if (e.mode === 'auto') {
          autoEdges.push(e);
        }
      }

      const remainderPerSec = Math.max(0, neededPerSec - manualPerSec - byproductPerSec);
      if (autoEdges.length > 0) {
        const perAutoPerSec = remainderPerSec / autoEdges.length;
        for (const e of autoEdges) {
          const interval = getEdgeInterval(e);
          resolvedFlows[e.id] = { flow: perAutoPerSec * interval, interval };
        }
      }
    }

    for (const e of incoming) {
      if (appState.nodes[e.fromNode] && !resolved.has(e.fromNode)) {
        queue.push(e.fromNode);
      }
    }
  }

  // Phase 1b: Cap outgoing auto flows from capacity-driven nodes
  // If downstream demand exceeds a capacity node's production, scale proportionally
  for (const [nid, node] of Object.entries(appState.nodes)) {
    if (node.type !== 'production' || (node.driveMode || 'demand') !== 'capacity') continue;
    const recipe = getRecipeForNode(nid);
    if (!recipe) continue;
    const queues = node.queues || 1;
    const fac = node.fixedFacilities || 1;
    const cyclesPerSec = fac * queues / recipe.cycleTime;

    for (const matKey of Object.keys(recipe.outputs)) {
      const outQty = recipe.outputs[matKey];
      const capacityPerSec = cyclesPerSec * outQty;

      const outEdges = getOutgoingEdges(nid).filter(e => e.fromMaterial === matKey && e.mode !== 'byproduct');
      let totalDemandPerSec = 0;
      for (const e of outEdges) {
        const rf = resolvedFlows[e.id];
        if (rf) totalDemandPerSec += rf.flow / rf.interval;
      }

      if (totalDemandPerSec > capacityPerSec && totalDemandPerSec > 0) {
        const scale = capacityPerSec / totalDemandPerSec;
        for (const e of outEdges) {
          if (e.mode === 'manual') continue;
          const rf = resolvedFlows[e.id];
          if (rf) {
            resolvedFlows[e.id] = { flow: rf.flow * scale, interval: rf.interval };
          }
        }
      }
    }
  }

  // Phase 2: Resolve byproduct edges (surplus only, never increases source production)
  // First compute production rates for all nodes
  const tempProduced = {};
  for (const [nid, node] of Object.entries(appState.nodes)) {
    if (node.type !== 'production') continue;
    const recipe = getRecipeForNode(nid);
    if (!recipe) continue;
    const isCapacity = (node.driveMode || 'demand') === 'capacity';
    const queues = node.queues || 1;
    let cyclesPerSec = 0;
    if (isCapacity) {
      cyclesPerSec = (node.fixedFacilities || 1) * queues / recipe.cycleTime;
    } else {
      const outgoing = getOutgoingEdges(nid).filter(e => e.mode !== 'byproduct');
      const outDemand = {};
      for (const e of outgoing) {
        const rf = resolvedFlows[e.id] || { flow: 0, interval: 86400 };
        outDemand[e.fromMaterial] = (outDemand[e.fromMaterial]||0) + rf.flow / rf.interval;
      }
      for (const [mk, ps] of Object.entries(outDemand)) {
        const outQty = recipe.outputs[mk] || 0;
        if (outQty > 0) cyclesPerSec = Math.max(cyclesPerSec, ps / outQty);
      }
    }
    tempProduced[nid] = {};
    for (const [k, q] of Object.entries(recipe.outputs)) {
      tempProduced[nid][k] = cyclesPerSec * q;
    }
  }

  for (const [eid, edge] of Object.entries(appState.edges)) {
    if (edge.mode !== 'byproduct') continue;
    const produced = tempProduced[edge.fromNode]?.[edge.fromMaterial] || 0;
    // Sum non-byproduct resolved flow from this port
    let allocatedPerSec = 0;
    for (const [oeid, oe] of Object.entries(appState.edges)) {
      if (oeid === eid) continue;
      if (oe.fromNode === edge.fromNode && oe.fromMaterial === edge.fromMaterial && oe.mode !== 'byproduct') {
        const rf = resolvedFlows[oeid] || { flow: 0, interval: 86400 };
        allocatedPerSec += rf.flow / rf.interval;
      }
    }
    const surplusPerSec = Math.max(0, produced - allocatedPerSec);
    const interval = getEdgeInterval(edge);
    resolvedFlows[eid] = { flow: surplusPerSec * interval, interval };
  }

  // Phase 3: Where byproduct edges feed the same input as auto edges,
  // reduce the auto edges so we don't over-produce upstream.
  // For each destination input that receives BOTH byproduct and auto flow,
  // the auto edges should only cover (needed - byproduct - manual).
  let changed = true;
  let adjustIter = 0;
  while (changed && adjustIter < 5) {
    changed = false;
    adjustIter++;
    for (const [nid, node] of Object.entries(appState.nodes)) {
      if (node.type !== 'production' && node.type !== 'output') continue;
      let inputMats;
      if (node.type === 'output') {
        inputMats = [node.materialKey];
      } else {
        const recipe = getRecipeForNode(nid);
        if (!recipe) continue;
        inputMats = Object.keys(recipe.inputs);
      }
      for (const matKey of inputMats) {
        const incoming = getIncomingEdges(nid).filter(e => e.toMaterial === matKey);
        const autoEdges = incoming.filter(e => (e.mode||'auto') === 'auto');
        const bpEdges = incoming.filter(e => (e.mode||'auto') === 'byproduct');
        if (!autoEdges.length || !bpEdges.length) continue;

        let neededPerSec;
        if (node.type === 'output') {
          neededPerSec = node.desiredAmount / (node.intervalSec || 86400);
        } else {
          const recipe = getRecipeForNode(nid);
          const outgoing = getOutgoingEdges(nid).filter(e => e.mode !== 'byproduct');
          const outDemand = {};
          for (const e of outgoing) {
            const rf = resolvedFlows[e.id] || { flow:0, interval:86400 };
            outDemand[e.fromMaterial] = (outDemand[e.fromMaterial]||0) + rf.flow / rf.interval;
          }
          let mCPS = 0;
          const isC = (node.driveMode||'demand') === 'capacity';
          if (isC) {
            mCPS = (node.fixedFacilities||1) * (node.queues||1) / recipe.cycleTime;
          } else {
            for (const [mk,ps] of Object.entries(outDemand)) {
              const oq = recipe.outputs[mk]||0;
              if (oq > 0) mCPS = Math.max(mCPS, ps/oq);
            }
          }
          neededPerSec = mCPS * (recipe.inputs[matKey] || 0);
        }

        let manualPerSec = 0;
        for (const e of incoming.filter(e => e.mode === 'manual')) {
          const rf = resolvedFlows[e.id];
          if (rf) manualPerSec += rf.flow / rf.interval;
        }
        let bpPerSec = 0;
        for (const e of bpEdges) {
          const rf = resolvedFlows[e.id];
          if (rf) bpPerSec += rf.flow / rf.interval;
        }

        const autoNeeded = Math.max(0, neededPerSec - manualPerSec - bpPerSec);
        const perAuto = autoEdges.length > 0 ? autoNeeded / autoEdges.length : 0;

        for (const e of autoEdges) {
          const interval = getEdgeInterval(e);
          const newFlow = perAuto * interval;
          const oldFlow = resolvedFlows[e.id]?.flow || 0;
          if (Math.abs(newFlow - oldFlow) > 0.001) {
            resolvedFlows[e.id] = { flow: newFlow, interval };
            changed = true;
          }
        }
      }
    }

    // After adjusting auto edges, recompute byproduct surplus
    if (changed) {
      for (const [eid, edge] of Object.entries(appState.edges)) {
        if (edge.mode !== 'byproduct') continue;
        const prod = tempProduced[edge.fromNode]?.[edge.fromMaterial] || 0;
        let alloc = 0;
        for (const [oeid, oe] of Object.entries(appState.edges)) {
          if (oeid === eid) continue;
          if (oe.fromNode === edge.fromNode && oe.fromMaterial === edge.fromMaterial && oe.mode !== 'byproduct') {
            const rf = resolvedFlows[oeid] || { flow:0, interval:86400 };
            alloc += rf.flow / rf.interval;
          }
        }
        const surplus = Math.max(0, prod - alloc);
        const interval = getEdgeInterval(edge);
        resolvedFlows[eid] = { flow: surplus * interval, interval };
      }
    }
  }

  } // end convergence loop

  // Fill any remaining
  for (const [eid, edge] of Object.entries(appState.edges)) {
    if (!resolvedFlows[eid]) {
      resolvedFlows[eid] = { flow: edge.mode === 'manual' ? (edge.flowPerInterval || 0) : 0, interval: getEdgeInterval(edge) };
    }
  }
}

function computeNodeStats() {
  resolveAutoFlows();
  const stats = {};

  for (const [nid, node] of Object.entries(appState.nodes)) {
    const s = { produced: {}, consumed: {}, supplied: {}, demanded: {}, facilities: 0 };

    if (node.type === 'production') {
      const recipe = getRecipeForNode(nid);
      if (recipe) {
        const isCapacity = (node.driveMode || 'demand') === 'capacity';
        const queues = node.queues || 1;
        let cyclesPerSec;

        if (isCapacity) {
          s.facilities = node.fixedFacilities || 1;
          cyclesPerSec = s.facilities * queues / recipe.cycleTime;
        } else {
          // Demand-driven: derive from outgoing resolved flows (exclude byproduct)
          const outgoing = getOutgoingEdges(nid).filter(e => e.mode !== 'byproduct');
          const totalOutputDemand = {};
          for (const e of outgoing) {
            const rf = getResolvedFlow(e.id);
            const perSec = rf.flow / rf.interval;
            totalOutputDemand[e.fromMaterial] = (totalOutputDemand[e.fromMaterial]||0) + perSec;
          }
          let maxCyclesPerSec = 0;
          for (const [matKey, perSec] of Object.entries(totalOutputDemand)) {
            const outQty = recipe.outputs[matKey] || 0;
            if (outQty > 0) maxCyclesPerSec = Math.max(maxCyclesPerSec, perSec / outQty);
          }
          cyclesPerSec = maxCyclesPerSec;
          if (cyclesPerSec > 0 && recipe.cycleTime > 0) {
            s.facilities = Math.max(1, Math.ceil(cyclesPerSec * recipe.cycleTime / queues));
          }
        }

        for (const [k,q] of Object.entries(recipe.outputs)) {
          s.produced[k] = cyclesPerSec * q;
        }
        for (const [k,q] of Object.entries(recipe.inputs)) {
          s.consumed[k] = cyclesPerSec * q;
        }

        s.cyclesPerSec = cyclesPerSec;
        s.power = (recipe.power || 0) * s.facilities;
      }
    } else if (node.type === 'output') {
      s.demanded[node.materialKey] = node.desiredAmount / node.intervalSec;
    } else if (node.type === 'input') {
      const outgoing = getOutgoingEdges(nid);
      for (const e of outgoing) {
        const rf = getResolvedFlow(e.id);
        s.supplied[e.fromMaterial] = (s.supplied[e.fromMaterial]||0) + rf.flow / rf.interval;
      }
    }

    stats[nid] = s;
  }
  return stats;
}

// For a production node's input: how much is connected vs needed
function getInputStatus(nodeId, matKey, stats) {
  const s = stats[nodeId];
  if (!s) return { neededPerSec: 0, connectedPerSec: 0 };
  const neededPerSec = s.consumed[matKey] || 0;
  const incoming = getIncomingEdges(nodeId).filter(e => e.toMaterial === matKey);
  let connectedPerSec = 0;
  for (const e of incoming) {
    const rf = getResolvedFlow(e.id);
    connectedPerSec += rf.flow / rf.interval;
  }
  return { neededPerSec, connectedPerSec };
}
